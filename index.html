<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>無人機學科題庫複習</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d1a;--card:#161628;--card2:#1e1e35;
  --accent:#6c63ff;--accent2:#8b83ff;
  --green:#2ecc71;--red:#e74c3c;--yellow:#f39c12;
  --text:#e8e8f4;--sub:#9090b0;--border:#2a2a45;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0;overflow-x:hidden}
.screen{display:none;min-height:100vh;padding:20px 16px 40px}
.screen.active{display:block}

/* HOME */
.home-header{text-align:center;padding:40px 0 32px}
.home-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:1px}
.home-sub{color:var(--sub);margin-top:6px;font-size:14px}
.exam-countdown{background:linear-gradient(135deg,#2d1b69,#1a1a3e);border:1px solid var(--accent);border-radius:16px;padding:16px 20px;margin:0 0 28px;text-align:center}
.countdown-label{font-size:12px;color:var(--sub);margin-bottom:4px}
.countdown-val{font-size:32px;font-weight:800;color:var(--accent2)}
.countdown-unit{font-size:13px;color:var(--sub);margin-left:4px}
.pool-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.stat-label{font-size:11px;color:var(--sub);margin-bottom:4px}
.stat-num{font-size:22px;font-weight:700;color:var(--accent2)}
.stat-sub{font-size:11px;color:var(--sub);margin-top:2px}
.home-btn{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 20px;margin-bottom:12px;cursor:pointer;transition:all .2s;width:100%;text-align:left}
.home-btn:active{transform:scale(.98);border-color:var(--accent)}
.home-btn-icon{font-size:26px;width:44px;text-align:center}
.home-btn-text{flex:1}
.home-btn-title{font-size:16px;font-weight:700;color:#fff}
.home-btn-desc{font-size:12px;color:var(--sub);margin-top:2px}
.home-btn-arrow{color:var(--sub);font-size:18px}

/* SETUP */
.setup-header{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.back-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;cursor:pointer;color:var(--text);font-size:14px}
.setup-title{font-size:20px;font-weight:700}
.section-label{font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.section{margin-bottom:24px}
.option-group{display:flex;flex-direction:column;gap:8px}
.option-btn{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 18px;cursor:pointer;text-align:left;transition:all .2s;color:var(--text)}
.option-btn.selected{border-color:var(--accent);background:#1a1530}
.option-btn-title{font-size:15px;font-weight:600}
.option-btn-desc{font-size:12px;color:var(--sub);margin-top:3px}
.count-selector{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.count-btn{background:var(--accent);border:none;border-radius:8px;width:36px;height:36px;font-size:20px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.count-val{flex:1;text-align:center;font-size:28px;font-weight:700;color:var(--accent2)}
.count-label{font-size:12px;color:var(--sub);text-align:center}
.start-btn{width:100%;padding:18px;background:linear-gradient(135deg,var(--accent),#a855f7);border:none;border-radius:16px;color:#fff;font-size:18px;font-weight:700;cursor:pointer;margin-top:8px;letter-spacing:.5px}
.start-btn:active{transform:scale(.98)}

/* QUIZ */
.quiz-header{margin-bottom:20px}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.quiz-progress-label{font-size:13px;color:var(--sub)}
.quiz-score-label{font-size:13px;color:var(--sub)}
.progress-bar{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#a855f7);border-radius:3px;transition:width .3s}
.quiz-pool-tag{display:inline-block;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--sub);margin-bottom:14px}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:18px}
.question-num{font-size:12px;color:var(--accent2);margin-bottom:8px;font-weight:600}
.question-text{font-size:16px;line-height:1.6;color:#fff;font-weight:500}
.options-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.option-item{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:all .15s}
.option-item:active{transform:scale(.99)}
.option-item.selected-wrong{border-color:var(--red);background:#2a0f0f}
.option-item.correct{border-color:var(--green);background:#0a2a1a}
.option-item.disabled{cursor:default;opacity:.7}
.option-letter{font-size:15px;font-weight:700;min-width:22px;margin-top:1px}
.option-text{font-size:15px;line-height:1.5;flex:1}
.option-item.correct .option-letter{color:var(--green)}
.option-item.selected-wrong .option-letter{color:var(--red)}

/* EXPLANATION */
.explanation-box{background:var(--card2);border-radius:16px;padding:18px;margin-bottom:18px;border-left:4px solid var(--accent)}
.explanation-result{font-size:20px;font-weight:800;margin-bottom:12px}
.explanation-result.correct{color:var(--green)}
.explanation-result.wrong{color:var(--red)}
.explanation-answer{font-size:13px;color:var(--accent2);margin-bottom:10px;font-weight:600}
.explanation-text{font-size:14px;line-height:1.7;color:#d0d0e8}
.next-btn{width:100%;padding:16px;background:var(--accent);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer}
.next-btn:active{transform:scale(.98)}
.end-early-btn{width:100%;padding:10px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--sub);font-size:13px;cursor:pointer;margin-top:8px}
.end-early-btn:active{border-color:var(--red);color:var(--red)}

/* RESULT */
.result-header{text-align:center;padding:32px 0 24px}
.result-score-ring{width:140px;height:140px;border-radius:50%;border:6px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;background:var(--card)}
.result-score-num{font-size:42px;font-weight:800;color:var(--accent2)}
.result-score-denom{font-size:14px;color:var(--sub)}
.result-title{font-size:22px;font-weight:700;margin-bottom:6px}
.result-sub{font-size:14px;color:var(--sub)}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:24px 0}
.result-stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center}
.result-stat-num{font-size:28px;font-weight:700}
.result-stat-label{font-size:12px;color:var(--sub);margin-top:4px}
.result-actions{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.result-btn{padding:15px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer}
.result-btn-primary{background:var(--accent);color:#fff}
.result-btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
.wrong-list-title{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--sub)}
.wrong-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.wrong-item-num{font-size:12px;color:var(--red);margin-bottom:6px;font-weight:600}
.wrong-item-text{font-size:13px;color:#d0d0e8;line-height:1.5}
.wrong-item-answer{font-size:12px;color:var(--green);margin-top:6px;font-weight:600}

/* OVERVIEW */
.overview-filter{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text);font-weight:600}
.filter-btn.active{border-color:var(--accent);color:var(--accent2)}
.overview-item{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px}
.overview-item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.overview-item-num{font-size:12px;color:var(--accent2);font-weight:600}
.overview-pool-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-light{background:#1a2a40;color:#60a5fa}
.badge-heavy{background:#2a1a1a;color:#f87171}
.overview-item-q{font-size:14px;line-height:1.6;color:#d0d0e8;margin-bottom:10px}
.overview-answer{font-size:13px;color:var(--green);font-weight:700;margin-bottom:8px}
.overview-exp{font-size:13px;line-height:1.6;color:var(--sub);border-top:1px solid var(--border);padding-top:8px}

/* ERROR REVIEW */
.error-item{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px}
.error-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.error-count-badge{background:#2a0f0f;border:1px solid var(--red);border-radius:20px;padding:4px 12px;font-size:13px;color:var(--red);font-weight:700}
.error-item-q{font-size:14px;line-height:1.6;color:#d0d0e8;margin-bottom:8px}
.error-item-answer{font-size:13px;color:var(--green);font-weight:700;margin-bottom:8px}
.error-item-exp{font-size:13px;line-height:1.6;color:var(--sub);border-top:1px solid var(--border);padding-top:8px}
.no-errors{text-align:center;padding:60px 20px;color:var(--sub)}
.no-errors-icon{font-size:48px;margin-bottom:16px}

/* Table in explanation */
.exp-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
.exp-table th{background:var(--card);padding:6px 8px;text-align:left;color:var(--accent2);border:1px solid var(--border)}
.exp-table td{padding:6px 8px;border:1px solid var(--border);line-height:1.4}
.exp-table tr:nth-child(even) td{background:#12122a}

@media(min-width:600px){.screen{max-width:600px;margin:0 auto}}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="home-header">
    <div class="home-title">🚁 無人機學科複習</div>
    <div class="home-sub">遙控無人機專業操作證</div>
  </div>
  <div class="exam-countdown">
    <div class="countdown-label">距離考試</div>
    <div><span class="countdown-val" id="countdown-val">—</span><span class="countdown-unit">小時</span></div>
  </div>
  <div class="pool-stats">
    <div class="stat-card">
      <div class="stat-label">一點點不熟</div>
      <div class="stat-num" id="stat-light">10</div>
      <div class="stat-sub">題（第一章）</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">很不熟</div>
      <div class="stat-num" id="stat-heavy">40</div>
      <div class="stat-sub">題（第一章）</div>
    </div>
  </div>
  <div class="home-btn" onclick="goTo('screen-setup')">
    <div class="home-btn-icon">✏️</div>
    <div class="home-btn-text">
      <div class="home-btn-title">開始練習</div>
      <div class="home-btn-desc">選池子、題數，隨機抽題</div>
    </div>
    <div class="home-btn-arrow">›</div>
  </div>
  <div class="home-btn" onclick="goTo('screen-overview')">
    <div class="home-btn-icon">📖</div>
    <div class="home-btn-text">
      <div class="home-btn-title">全覽題目</div>
      <div class="home-btn-desc">一次瀏覽所有題目、答案、解析</div>
    </div>
    <div class="home-btn-arrow">›</div>
  </div>
  <div class="home-btn" onclick="goTo('screen-errors')">
    <div class="home-btn-icon">🔴</div>
    <div class="home-btn-text">
      <div class="home-btn-title">錯題回顧</div>
      <div class="home-btn-desc">依錯誤次數排序，附解析</div>
    </div>
    <div class="home-btn-arrow">›</div>
  </div>
</div>

<!-- SETUP -->
<div class="screen" id="screen-setup">
  <div class="setup-header">
    <button class="back-btn" onclick="goTo('screen-home')">← 返回</button>
    <div class="setup-title">練習設定</div>
  </div>
  <div class="section">
    <div class="section-label">選擇章節</div>
    <div class="option-group">
      <button class="option-btn selected" id="chap-1" onclick="selectChap(1)">
        <div class="option-btn-title">第一章　民用航空法及相關法規</div>
        <div class="option-btn-desc">共 50 題在你的複習池</div>
      </button>
    </div>
  </div>
  <div class="section">
    <div class="section-label">選擇題目池</div>
    <div class="option-group">
      <button class="option-btn" id="pool-light" onclick="selectPool('light')">
        <div class="option-btn-title">🔵 一點點不熟</div>
        <div class="option-btn-desc">10 題</div>
      </button>
      <button class="option-btn" id="pool-heavy" onclick="selectPool('heavy')">
        <div class="option-btn-title">🔴 很不熟</div>
        <div class="option-btn-desc">40 題</div>
      </button>
      <button class="option-btn selected" id="pool-mixed" onclick="selectPool('mixed')">
        <div class="option-btn-title">🟣 混合（很不熟優先）</div>
        <div class="option-btn-desc">70% 很不熟 + 30% 一點點不熟</div>
      </button>
    </div>
  </div>
  <div class="section">
    <div class="section-label">題數</div>
    <div class="count-selector">
      <button class="count-btn" onclick="changeCount(-5)">−</button>
      <div>
        <div class="count-val" id="count-display">10</div>
        <div class="count-label">題</div>
      </div>
      <button class="count-btn" onclick="changeCount(5)">+</button>
    </div>
  </div>
  <button class="start-btn" onclick="startQuiz()">開始練習 →</button>
</div>

<!-- QUIZ -->
<div class="screen" id="screen-quiz">
  <div class="quiz-header">
    <div class="quiz-meta">
      <span class="quiz-progress-label" id="quiz-progress-label">第 1 / 10 題</span>
      <span class="quiz-score-label" id="quiz-score-label">✅ 0　❌ 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="quiz-pool-tag" id="quiz-pool-tag">混合</div>
  <div class="question-card">
    <div class="question-num" id="q-num">第 1 章　第 18 題</div>
    <div class="question-text" id="q-text"></div>
  </div>
  <div class="options-list" id="options-list"></div>
  <div id="explanation-area" style="display:none">
    <div class="explanation-box">
      <div class="explanation-result" id="exp-result"></div>
      <div class="explanation-answer" id="exp-answer"></div>
      <div class="explanation-text" id="exp-text"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 →</button>
    <button class="end-early-btn" onclick="confirmEndEarly()">⏹ 提前結束本次練習</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <div class="result-header">
    <div class="result-score-ring">
      <div class="result-score-num" id="result-score">85</div>
      <div class="result-score-denom">/ 100</div>
    </div>
    <div class="result-title" id="result-title">不錯！繼續加油</div>
    <div class="result-sub" id="result-sub">換算100分制成績</div>
  </div>
  <div class="result-stats">
    <div class="result-stat">
      <div class="result-stat-num" id="r-correct" style="color:var(--green)">0</div>
      <div class="result-stat-label">答對</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-num" id="r-wrong" style="color:var(--red)">0</div>
      <div class="result-stat-label">答錯</div>
    </div>
  </div>
  <div class="result-actions">
    <button class="result-btn result-btn-primary" onclick="goTo('screen-home')">回首頁</button>
    <button class="result-btn result-btn-secondary" onclick="goTo('screen-errors')">查看錯題回顧</button>
    <button class="result-btn result-btn-secondary" onclick="goTo('screen-setup')">再練一次</button>
  </div>
  <div id="wrong-list-area"></div>
</div>

<!-- OVERVIEW -->
<div class="screen" id="screen-overview">
  <div class="setup-header">
    <button class="back-btn" onclick="goTo('screen-home')">← 返回</button>
    <div class="setup-title">全覽題目</div>
  </div>
  <div class="overview-filter">
    <button class="filter-btn active" id="ov-all" onclick="setOvFilter('all')">全部</button>
    <button class="filter-btn" id="ov-light" onclick="setOvFilter('light')">一點點不熟</button>
    <button class="filter-btn" id="ov-heavy" onclick="setOvFilter('heavy')">很不熟</button>
  </div>
  <div id="overview-list"></div>
</div>

<!-- ERRORS -->
<div class="screen" id="screen-errors">
  <div class="setup-header">
    <button class="back-btn" onclick="goTo('screen-home')">← 返回</button>
    <div class="setup-title">錯題回顧</div>
  </div>
  <div id="error-list"></div>
</div>

<script>
// ─── QUESTION DATA ─────────────────────────────────────────────────────────

const QUESTIONS = {
  // ── 一點點不熟 ──
  'ch1_18': {
    ch:1, num:18, pool:'light',
    text:'於何處進行遙控無人機飛航活動適用民用航空法之「遙控無人機」相關規定？',
    opts:{A:'建築物內密閉空間',B:'建築物外開放空間',C:'任何空間',D:'以上皆非'},
    ans:'B',
    exp:'【關鍵字：建築物「外」】民航法只管室外天空！室內場館比賽不在規範內。記憶：牆壁擋住就沒有民航局的事。',
    related:[]
  },
  'ch1_22': {
    ch:1, num:22, pool:'light',
    text:'直轄市、縣（市）政府依民航法第99條之13第2項所規範之區域內，得依公益及安全需要，進行哪些項目之公告？',
    opts:{A:'遙控無人機活動區域',B:'遙控無人機活動時間',C:'其他管理事項',D:'以上皆是'},
    ans:'D',
    exp:'【地點＋時間＋其他，全包選D】縣市政府有完整管理權，三項全都能管：活動區域、活動時間、其他管理事項。\n\n延伸知識：中央主管機關想禁飛，也要提請縣市政府公告（不能自己直接公告）。違反縣市公告的罰款是3萬-15萬。',
    related:['ch1_23','ch1_25','ch1_48']
  },
  'ch1_23': {
    ch:1, num:23, pool:'light',
    text:'中央主管機關認有禁止或限制遙控無人機飛航活動需求者，得提請所在地哪個機關進行公告？',
    opts:{A:'鄉鎮區公所',B:'直轄市、縣（市）政府',C:'地方派出所',D:'地方農會'},
    ans:'B',
    exp:'【中央提請→地方公告】中央想禁飛，要「委託」縣市政府幫忙公告。記憶：中央不能自己直接貼公告，要找地方。',
    related:['ch1_22','ch1_25']
  },
  'ch1_25': {
    ch:1, num:25, pool:'light',
    text:'政府機關（構）、學校或法人因執行業務需於直轄市、縣（市）政府所公告之遙控無人機活動區域、時間及其他管理事項外從事飛航活動者，應申請何者會商相關中央主管機關同意後，始得為之？',
    opts:{A:'直轄市、縣（市）政府',B:'衛福部',C:'農委會',D:'交通部'},
    ans:'A',
    exp:'【誰家地盤找誰申請→縣市政府】縣市政府公告的區域外想飛，就向縣市政府申請。\n\n延伸：如果是跨縣市飛航，要從「起飛地」所在縣市政府提出申請，並取得飛越縣市的同意，不是找終點地的縣市政府。',
    related:['ch1_22','ch1_23','ch1_111']
  },

    exp:'【太陽落下就停機！不是等天黑】規定是「日落後至日出前」不得飛航，所以要在「日落時間」（18:46）就停，不是等民用暮光（天還有點亮）才停。記憶：「日落 = 停機，標準看太陽不看天色」。',
    related:[]
  },
  'ch1_146': {
    ch:1, num:146, pool:'heavy',
    text:'有關操作人從事遙控無人機飛航活動時應注意之距離限制，下列何者為正確？',
    opts:{A:'應至少距高速公路範圍10公尺以上',B:'應至少距高架鐵路範圍20公尺以上',C:'應至少距建築物及障礙物範圍30公尺以上',D:'以上均正確'},
    ans:'C',
    exp:'【建築物及障礙物 = 30公尺】A說高速公路10公尺→錯！B說高架鐵路20公尺→錯！只有C正確。注意D說「以上均正確」但A和B都是錯的，所以不選D。記憶：「30公尺才對，10和20都是陷阱」。',
    related:[]
  }
};

// ─── STATE ──────────────────────────────────────────────────────────────────
let state = {
  pool: 'mixed',
  count: 10,
  chapter: 1,
  queue: [],
  current: 0,
  correct: 0,
  wrong: 0,
  wrongIds: [],
  answered: false,
  ovFilter: 'all'
};

// ─── localStorage ────────────────────────────────────────────────────────────
function getErrors() {
  try { return JSON.parse(localStorage.getItem('drone_errors') || '{}'); } catch(e) { return {}; }
}
function saveErrors(e) {
  localStorage.setItem('drone_errors', JSON.stringify(e));
}
function incError(id) {
  const e = getErrors();
  e[id] = (e[id] || 0) + 1;
  saveErrors(e);
}

// ─── ROUTING ─────────────────────────────────────────────────────────────────
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
  if (id === 'screen-overview') renderOverview();
  if (id === 'screen-errors') renderErrors();
  if (id === 'screen-home') updateHomeStats();
}

// ─── COUNTDOWN ───────────────────────────────────────────────────────────────
function updateCountdown() {
  // Exam: 2026-04-21 afternoon, assume 14:00
  const exam = new Date('2026-04-21T14:00:00+08:00');
  const now = new Date();
  const diff = exam - now;
  const el = document.getElementById('countdown-val');
  if (diff <= 0) { el.textContent = '考試時間到！'; return; }
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  el.textContent = h + 'h ' + m + 'm';
  el.parentElement.querySelector('.countdown-unit').textContent = '';
}

// ─── HOME ────────────────────────────────────────────────────────────────────
function updateHomeStats() {
  const all = Object.values(QUESTIONS);
  document.getElementById('stat-light').textContent = all.filter(q=>q.pool==='light').length;
  document.getElementById('stat-heavy').textContent = all.filter(q=>q.pool==='heavy').length;
}

// ─── SETUP ───────────────────────────────────────────────────────────────────
function selectPool(p) {
  state.pool = p;
  ['light','heavy','mixed'].forEach(x => {
    document.getElementById('pool-'+x).classList.toggle('selected', x===p);
  });
}
function selectChap(c) { state.chapter = c; }
function changeCount(d) {
  const all = getPoolIds(state.pool);
  state.count = Math.max(5, Math.min(all.length, state.count + d));
  document.getElementById('count-display').textContent = state.count;
}

// ─── QUIZ ────────────────────────────────────────────────────────────────────
function getPoolIds(pool) {
  const all = Object.values(QUESTIONS);
  if (pool === 'light') return all.filter(q=>q.pool==='light').map(q=>'ch'+q.ch+'_'+q.num);
  if (pool === 'heavy') return all.filter(q=>q.pool==='heavy').map(q=>'ch'+q.ch+'_'+q.num);
  // mixed: 70% heavy, 30% light
  return all.map(q=>'ch'+q.ch+'_'+q.num);
}

function buildQueue(pool, count) {
  const all = Object.values(QUESTIONS);
  let heavy = all.filter(q=>q.pool==='heavy').map(q=>'ch'+q.ch+'_'+q.num);
  let light = all.filter(q=>q.pool==='light').map(q=>'ch'+q.ch+'_'+q.num);
  let ids = [];
  if (pool === 'light') ids = [...light];
  else if (pool === 'heavy') ids = [...heavy];
  else {
    // mixed: 70% heavy, 30% light
    const hn = Math.round(count * 0.7);
    const ln = count - hn;
    const sh = shuffle([...heavy]).slice(0, hn);
    const sl = shuffle([...light]).slice(0, ln);
    ids = shuffle([...sh, ...sl]);
  }
  return shuffle(ids).slice(0, Math.min(count, ids.length));
}

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  state.queue = buildQueue(state.pool, state.count);
  state.current = 0;
  state.correct = 0;
  state.wrong = 0;
  state.wrongIds = [];
  goTo('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const id = state.queue[state.current];
  const q = QUESTIONS[id];
  state.answered = false;

  const poolLabel = {'light':'🔵 一點點不熟','heavy':'🔴 很不熟','mixed':'🟣 混合'}[state.pool];
  document.getElementById('quiz-pool-tag').textContent = poolLabel + '　　第' + q.ch + '章';
  document.getElementById('quiz-progress-label').textContent = '第 '+(state.current+1)+' / '+state.queue.length+' 題';
  document.getElementById('quiz-score-label').textContent = '✅ '+state.correct+'　❌ '+state.wrong;
  document.getElementById('progress-fill').style.width = (state.current/state.queue.length*100)+'%';
  document.getElementById('q-num').textContent = '第 '+q.ch+' 章　第 '+q.num+' 題';
  document.getElementById('q-text').textContent = q.text;

  const ol = document.getElementById('options-list');
  ol.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const div = document.createElement('div');
    div.className = 'option-item';
    div.id = 'opt-'+letter;
    div.innerHTML = '<span class="option-letter">'+letter+'</span><span class="option-text">'+q.opts[letter]+'</span>';
    div.onclick = () => selectAnswer(letter);
    ol.appendChild(div);
  });

  document.getElementById('explanation-area').style.display = 'none';
  const nb = document.getElementById('next-btn');
  nb.textContent = state.current < state.queue.length-1 ? '下一題 →' : '查看結果 →';
}

function selectAnswer(chosen) {
  if (state.answered) return;
  state.answered = true;
  const id = state.queue[state.current];
  const q = QUESTIONS[id];
  const correct = q.ans;
  const isRight = chosen === correct;

  ['A','B','C','D'].forEach(l => {
    const el = document.getElementById('opt-'+l);
    el.classList.add('disabled');
    if (l === correct) el.classList.add('correct');
    else if (l === chosen && !isRight) el.classList.add('selected-wrong');
  });

  if (isRight) {
    state.correct++;
    document.getElementById('exp-result').textContent = '✅ 答對了！';
    document.getElementById('exp-result').className = 'explanation-result correct';
    document.getElementById('exp-answer').textContent = '正確答案：' + correct + '　' + q.opts[correct];
  } else {
    state.wrong++;
    state.wrongIds.push(id);
    incError(id);
    document.getElementById('exp-result').textContent = '❌ 答錯了';
    document.getElementById('exp-result').className = 'explanation-result wrong';
    document.getElementById('exp-answer').textContent = '正確答案：' + correct + '　' + q.opts[correct];
  }

  document.getElementById('exp-text').innerHTML = q.exp.replace(/\n/g, '<br>');
  document.getElementById('explanation-area').style.display = 'block';
  document.getElementById('quiz-score-label').textContent = '✅ '+state.correct+'　❌ '+state.wrong;
}

function nextQuestion() {
  if (state.current < state.queue.length-1) {
    state.current++;
    renderQuestion();
    window.scrollTo(0,0);
  } else {
    showResult();
  }
}
function confirmEndEarly() {
  if (confirm('確定要提前結束練習嗎？\n目前已答 '+(state.current+1)+' 題，成績將以已答題數計算。')) {
    // trim queue to answered portion
    state.queue = state.queue.slice(0, state.current + 1);
    showResult();
  }
}

// ─── RESULT ──────────────────────────────────────────────────────────────────
function showResult() {
  goTo('screen-result');
  const total = state.queue.length;
  const score = Math.round((state.correct / total) * 100);
  document.getElementById('result-score').textContent = score;
  const titles = [
    [90,'太強了！考試必過 🎉'],
    [75,'很不錯，再複習一下！'],
    [60,'還要加油，重點再看看'],
    [0,'多練幾次，一定可以的！']
  ];
  const t = titles.find(([min]) => score >= min);
  document.getElementById('result-title').textContent = t ? t[1] : '加油！';
  document.getElementById('result-sub').textContent = '（換算100分制成績）';
  document.getElementById('r-correct').textContent = state.correct;
  document.getElementById('r-wrong').textContent = state.wrong;

  const area = document.getElementById('wrong-list-area');
  if (state.wrongIds.length === 0) {
    area.innerHTML = '<div style="text-align:center;padding:20px;color:var(--green)">🎉 全部答對！</div>';
    return;
  }
  let html = '<div class="wrong-list-title">本次答錯的題目：</div>';
  state.wrongIds.forEach(id => {
    const q = QUESTIONS[id];
    html += `<div class="wrong-item">
      <div class="wrong-item-num">第${q.ch}章 第${q.num}題</div>
      <div class="wrong-item-text">${q.text.substring(0,60)}…</div>
      <div class="wrong-item-answer">✅ 正確答案：${q.ans}　${q.opts[q.ans]}</div>
    </div>`;
  });
  area.innerHTML = html;
}

// ─── OVERVIEW ────────────────────────────────────────────────────────────────
function setOvFilter(f) {
  state.ovFilter = f;
  ['all','light','heavy'].forEach(x => {
    document.getElementById('ov-'+x).classList.toggle('active', x===f);
  });
  renderOverview();
}

function renderOverview() {
  const all = Object.values(QUESTIONS);
  const filtered = state.ovFilter === 'all' ? all :
    all.filter(q => q.pool === state.ovFilter);
  const el = document.getElementById('overview-list');
  el.innerHTML = filtered.map(q => {
    const badge = q.pool === 'light'
      ? '<span class="overview-pool-badge badge-light">一點點不熟</span>'
      : '<span class="overview-pool-badge badge-heavy">很不熟</span>';
    return `<div class="overview-item">
      <div class="overview-item-header">
        <span class="overview-item-num">第${q.ch}章 第${q.num}題</span>
        ${badge}
      </div>
      <div class="overview-item-q">${q.text}</div>
      <div class="overview-answer">✅ ${q.ans}　${q.opts[q.ans]}</div>
      <div class="overview-exp">${q.exp.replace(/\n/g,'<br>')}</div>
    </div>`;
  }).join('');
}

// ─── ERRORS ──────────────────────────────────────────────────────────────────
function renderErrors() {
  const errs = getErrors();
  const el = document.getElementById('error-list');
  const entries = Object.entries(errs).filter(([id]) => QUESTIONS[id]);
  if (entries.length === 0) {
    el.innerHTML = '<div class="no-errors"><div class="no-errors-icon">🎉</div><div>還沒有錯題紀錄！</div><div style="margin-top:8px;font-size:13px">開始練習後，答錯的題目會顯示在這裡</div></div>';
    return;
  }
  entries.sort((a,b) => b[1]-a[1]);
  el.innerHTML = entries.map(([id, cnt]) => {
    const q = QUESTIONS[id];
    return `<div class="error-item">
      <div class="error-item-header">
        <span style="font-size:13px;color:var(--sub)">第${q.ch}章 第${q.num}題</span>
        <span class="error-count-badge">答錯 ${cnt} 次</span>
      </div>
      <div class="error-item-q">${q.text}</div>
      <div class="error-item-answer">✅ 正確答案：${q.ans}　${q.opts[q.ans]}</div>
      <div class="error-item-exp">${q.exp.replace(/\n/g,'<br>')}</div>
    </div>`;
  }).join('');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
selectPool('mixed');
updateCountdown();
setInterval(updateCountdown, 60000);
updateHomeStats();
</script>
