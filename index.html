<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>無人機學科題庫複習</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d1a;--card:#161628;--card2:#1e1e35;
  --accent:#6c63ff;--accent2:#8b83ff;
  --green:#2ecc71;--red:#e74c3c;--yellow:#f39c12;
  --text:#e8e8f4;--sub:#9090b0;--border:#2a2a45;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0;overflow-x:hidden}
.screen{display:none;min-height:100vh;padding:20px 16px 40px}
.screen.active{display:block}

/* HOME */
.home-header{text-align:center;padding:40px 0 32px}
.home-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:1px}
.home-sub{color:var(--sub);margin-top:6px;font-size:14px}
.exam-countdown{background:linear-gradient(135deg,#2d1b69,#1a1a3e);border:1px solid var(--accent);border-radius:16px;padding:16px 20px;margin:0 0 28px;text-align:center}
.countdown-label{font-size:12px;color:var(--sub);margin-bottom:4px}
.countdown-val{font-size:32px;font-weight:800;color:var(--accent2)}
.countdown-unit{font-size:13px;color:var(--sub);margin-left:4px}
.pool-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.stat-label{font-size:11px;color:var(--sub);margin-bottom:4px}
.stat-num{font-size:22px;font-weight:700;color:var(--accent2)}
.stat-sub{font-size:11px;color:var(--sub);margin-top:2px}
.home-btn{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 20px;margin-bottom:12px;cursor:pointer;transition:all .2s;width:100%;text-align:left}
.home-btn:active{transform:scale(.98);border-color:var(--accent)}
.home-btn-icon{font-size:26px;width:44px;text-align:center}
.home-btn-text{flex:1}
.home-btn-title{font-size:16px;font-weight:700;color:#fff}
.home-btn-desc{font-size:12px;color:var(--sub);margin-top:2px}
.home-btn-arrow{color:var(--sub);font-size:18px}

/* SETUP */
.setup-header{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.back-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;cursor:pointer;color:var(--text);font-size:14px}
.setup-title{font-size:20px;font-weight:700}
.section-label{font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.section{margin-bottom:24px}
.option-group{display:flex;flex-direction:column;gap:8px}
.option-btn{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 18px;cursor:pointer;text-align:left;transition:all .2s;color:var(--text)}
.option-btn.selected{border-color:var(--accent);background:#1a1530}
.option-btn-title{font-size:15px;font-weight:600}
.option-btn-desc{font-size:12px;color:var(--sub);margin-top:3px}
.count-selector{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.count-btn{background:var(--accent);border:none;border-radius:8px;width:36px;height:36px;font-size:20px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.count-val{flex:1;text-align:center;font-size:28px;font-weight:700;color:var(--accent2)}
.count-label{font-size:12px;color:var(--sub);text-align:center}
.start-btn{width:100%;padding:18px;background:linear-gradient(135deg,var(--accent),#a855f7);border:none;border-radius:16px;color:#fff;font-size:18px;font-weight:700;cursor:pointer;margin-top:8px;letter-spacing:.5px}
.start-btn:active{transform:scale(.98)}

/* QUIZ */
.quiz-header{margin-bottom:20px}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.quiz-progress-label{font-size:13px;color:var(--sub)}
.quiz-score-label{font-size:13px;color:var(--sub)}
.progress-bar{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#a855f7);border-radius:3px;transition:width .3s}
.quiz-pool-tag{display:inline-block;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--sub);margin-bottom:14px}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:18px}
.question-num{font-size:12px;color:var(--accent2);margin-bottom:8px;font-weight:600}
.question-text{font-size:16px;line-height:1.6;color:#fff;font-weight:500}
.options-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.option-item{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:all .15s}
.option-item:active{transform:scale(.99)}
.option-item.selected-wrong{border-color:var(--red);background:#2a0f0f}
.option-item.correct{border-color:var(--green);background:#0a2a1a}
.option-item.disabled{cursor:default;opacity:.7}
.option-letter{font-size:15px;font-weight:700;min-width:22px;margin-top:1px}
.option-text{font-size:15px;line-height:1.5;flex:1}
.option-item.correct .option-letter{color:var(--green)}
.option-item.selected-wrong .option-letter{color:var(--red)}

/* EXPLANATION */
.explanation-box{background:var(--card2);border-radius:16px;padding:18px;margin-bottom:18px;border-left:4px solid var(--accent)}
.explanation-result{font-size:20px;font-weight:800;margin-bottom:12px}
.explanation-result.correct{color:var(--green)}
.explanation-result.wrong{color:var(--red)}
.explanation-answer{font-size:13px;color:var(--accent2);margin-bottom:10px;font-weight:600}
.explanation-text{font-size:14px;line-height:1.7;color:#d0d0e8}
.next-btn{width:100%;padding:16px;background:var(--accent);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer}
.next-btn:active{transform:scale(.98)}
.end-early-btn{width:100%;padding:10px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--sub);font-size:13px;cursor:pointer;margin-top:8px}
.end-early-btn:active{border-color:var(--red);color:var(--red)}

/* RESULT */
.result-header{text-align:center;padding:32px 0 24px}
.result-score-ring{width:140px;height:140px;border-radius:50%;border:6px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;background:var(--card)}
.result-score-num{font-size:42px;font-weight:800;color:var(--accent2)}
.result-score-denom{font-size:14px;color:var(--sub)}
.result-title{font-size:22px;font-weight:700;margin-bottom:6px}
.result-sub{font-size:14px;color:var(--sub)}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:24px 0}
.result-stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center}
.result-stat-num{font-size:28px;font-weight:700}
.result-stat-label{font-size:12px;color:var(--sub);margin-top:4px}
.result-actions{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.result-btn{padding:15px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer}
.result-btn-primary{background:var(--accent);color:#fff}
.result-btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
.wrong-list-title{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--sub)}
.wrong-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.wrong-item-num{font-size:12px;color:var(--red);margin-bottom:6px;font-weight:600}
.wrong-item-text{font-size:13px;color:#d0d0e8;line-height:1.5}
.wrong-item-answer{font-size:12px;color:var(--green);margin-top:6px;font-weight:600}

/* OVERVIEW */
.overview-filter{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text);font-weight:600}
.filter-btn.active{border-color:var(--accent);color:var(--accent2)}
.overview-item{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px}
.overview-item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.overview-item-num{font-size:12px;color:var(--accent2);font-weight:600}
.overview-pool-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-light{background:#1a2a40;color:#60a5fa}
.badge-heavy{background:#2a1a1a;color:#f87171}
.overview-item-q{font-size:14px;line-height:1.6;color:#d0d0e8;margin-bottom:10px}
.overview-answer{font-size:13px;color:var(--green);font-weight:700;margin-bottom:8px}
.overview-exp{font-size:13px;line-height:1.6;color:var(--sub);border-top:1px solid var(--border);padding-top:8px}

/* ERROR REVIEW */
.error-item{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px}
.error-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.error-count-badge{background:#2a0f0f;border:1px solid var(--red);border-radius:20px;padding:4px 12px;font-size:13px;color:var(--red);font-weight:700}
.error-item-q{font-size:14px;line-height:1.6;color:#d0d0e8;margin-bottom:8px}
.error-item-answer{font-size:13px;color:var(--green);font-weight:700;margin-bottom:8px}
.error-item-exp{font-size:13px;line-height:1.6;color:var(--sub);border-top:1px solid var(--border);padding-top:8px}
.no-errors{text-align:center;padding:60px 20px;color:var(--sub)}
.no-errors-icon{font-size:48px;margin-bottom:16px}

/* Table in explanation */
.exp-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
.exp-table th{background:var(--card);padding:6px 8px;text-align:left;color:var(--accent2);border:1px solid var(--border)}
.exp-table td{padding:6px 8px;border:1px solid var(--border);line-height:1.4}
.exp-table tr:nth-child(even) td{background:#12122a}

@media(min-width:600px){.screen{max-width:600px;margin:0 auto}}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="home-header">
    <div class="home-title">🚁 無人機學科複習</div>
    <div class="home-sub">遙控無人機專業操作證</div>
  </div>
  <div class="exam-countdown">
    <div class="countdown-label">距離考試</div>
    <div><span class="countdown-val" id="countdown-val">—</span><span class="countdown-unit">小時</span></div>
  </div>
  <div class="pool-stats">
    <div class="stat-card">
      <div class="stat-label">一點點不熟</div>
      <div class="stat-num" id="stat-light">10</div>
      <div class="stat-sub">題（第一章）</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">很不熟</div>
      <div class="stat-num" id="stat-heavy">40</div>
      <div class="stat-sub">題（第一章）</div>
    </div>
  </div>
  <div class="home-btn" onclick="goTo('screen-setup')" ontouchstart="">
    <div class="home-btn-icon">✏️</div>
    <div class="home-btn-text">
      <div class="home-btn-title">開始練習</div>
      <div class="home-btn-desc">選池子、題數，隨機抽題</div>
    </div>
    <div class="home-btn-arrow">›</div>
  </div>
  <div class="home-btn" onclick="goTo('screen-overview')" ontouchstart="">
    <div class="home-btn-icon">📖</div>
    <div class="home-btn-text">
      <div class="home-btn-title">全覽題目</div>
      <div class="home-btn-desc">一次瀏覽所有題目、答案、解析</div>
    </div>
    <div class="home-btn-arrow">›</div>
  </div>
  <div class="home-btn" onclick="goTo('screen-errors')" ontouchstart="">
    <div class="home-btn-icon">🔴</div>
    <div class="home-btn-text">
      <div class="home-btn-title">錯題回顧</div>
      <div class="home-btn-desc">依錯誤次數排序，附解析</div>
    </div>
    <div class="home-btn-arrow">›</div>
  </div>
</div>

<!-- SETUP -->
<div class="screen" id="screen-setup">
  <div class="setup-header">
    <button class="back-btn" onclick="goTo('screen-home')">← 返回</button>
    <div class="setup-title">練習設定</div>
  </div>
  <div class="section">
    <div class="section-label">選擇章節</div>
    <div class="option-group">
      <button class="option-btn selected" id="chap-1" onclick="selectChap(1)">
        <div class="option-btn-title">第一章　民用航空法及相關法規</div>
        <div class="option-btn-desc">共 50 題在你的複習池</div>
      </button>
    </div>
  </div>
  <div class="section">
    <div class="section-label">選擇題目池</div>
    <div class="option-group">
      <button class="option-btn" id="pool-light" onclick="selectPool('light')">
        <div class="option-btn-title">🔵 一點點不熟</div>
        <div class="option-btn-desc">10 題</div>
      </button>
      <button class="option-btn" id="pool-heavy" onclick="selectPool('heavy')">
        <div class="option-btn-title">🔴 很不熟</div>
        <div class="option-btn-desc">40 題</div>
      </button>
      <button class="option-btn selected" id="pool-mixed" onclick="selectPool('mixed')">
        <div class="option-btn-title">🟣 混合（很不熟優先）</div>
        <div class="option-btn-desc">70% 很不熟 + 30% 一點點不熟</div>
      </button>
    </div>
  </div>
  <div class="section">
    <div class="section-label">題數</div>
    <div class="count-selector">
      <button class="count-btn" onclick="changeCount(-5)">−</button>
      <div>
        <div class="count-val" id="count-display">10</div>
        <div class="count-label">題</div>
      </div>
      <button class="count-btn" onclick="changeCount(5)">+</button>
    </div>
  </div>
  <button class="start-btn" onclick="startQuiz()">開始練習 →</button>
</div>

<!-- QUIZ -->
<div class="screen" id="screen-quiz">
  <div class="quiz-header">
    <div class="quiz-meta">
      <span class="quiz-progress-label" id="quiz-progress-label">第 1 / 10 題</span>
      <span class="quiz-score-label" id="quiz-score-label">✅ 0　❌ 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="quiz-pool-tag" id="quiz-pool-tag">混合</div>
  <div class="question-card">
    <div class="question-num" id="q-num">第 1 章　第 18 題</div>
    <div class="question-text" id="q-text"></div>
  </div>
  <div class="options-list" id="options-list"></div>
  <div id="explanation-area" style="display:none">
    <div class="explanation-box">
      <div class="explanation-result" id="exp-result"></div>
      <div class="explanation-answer" id="exp-answer"></div>
      <div class="explanation-text" id="exp-text"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 →</button>
    <button class="end-early-btn" onclick="confirmEndEarly()">⏹ 提前結束本次練習</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <div class="result-header">
    <div class="result-score-ring">
      <div class="result-score-num" id="result-score">85</div>
      <div class="result-score-denom">/ 100</div>
    </div>
    <div class="result-title" id="result-title">不錯！繼續加油</div>
    <div class="result-sub" id="result-sub">換算100分制成績</div>
  </div>
  <div class="result-stats">
    <div class="result-stat">
      <div class="result-stat-num" id="r-correct" style="color:var(--green)">0</div>
      <div class="result-stat-label">答對</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-num" id="r-wrong" style="color:var(--red)">0</div>
      <div class="result-stat-label">答錯</div>
    </div>
  </div>
  <div class="result-actions">
    <button class="result-btn result-btn-primary" onclick="goTo('screen-home')">回首頁</button>
    <button class="result-btn result-btn-secondary" onclick="goTo('screen-errors')">查看錯題回顧</button>
    <button class="result-btn result-btn-secondary" onclick="goTo('screen-setup')">再練一次</button>
  </div>
  <div id="wrong-list-area"></div>
</div>

<!-- OVERVIEW -->
<div class="screen" id="screen-overview">
  <div class="setup-header">
    <button class="back-btn" onclick="goTo('screen-home')">← 返回</button>
    <div class="setup-title">全覽題目</div>
  </div>
  <div class="overview-filter">
    <button class="filter-btn active" id="ov-all" onclick="setOvFilter('all')">全部</button>
    <button class="filter-btn" id="ov-light" onclick="setOvFilter('light')">一點點不熟</button>
    <button class="filter-btn" id="ov-heavy" onclick="setOvFilter('heavy')">很不熟</button>
  </div>
  <div id="overview-list"></div>
</div>

<!-- ERRORS -->
<div class="screen" id="screen-errors">
  <div class="setup-header">
    <button class="back-btn" onclick="goTo('screen-home')">← 返回</button>
    <div class="setup-title">錯題回顧</div>
  </div>
  <div id="error-list"></div>
</div>

<script>
// ─── QUESTION DATA ─────────────────────────────────────────────────────────

const QUESTIONS = {
  // ── 一點點不熟 ──
  'ch1_18': {
    ch:1, num:18, pool:'light',
    text:'於何處進行遙控無人機飛航活動適用民用航空法之「遙控無人機」相關規定？',
    opts:{A:'建築物內密閉空間',B:'建築物外開放空間',C:'任何空間',D:'以上皆非'},
    ans:'B',
    exp:'【關鍵字：建築物「外」】民航法只管室外天空！室內場館比賽不在規範內。記憶：牆壁擋住就沒有民航局的事。',
    related:[]
  },
  'ch1_22': {
    ch:1, num:22, pool:'light',
    text:'直轄市、縣（市）政府依民航法第99條之13第2項所規範之區域內，得依公益及安全需要，進行哪些項目之公告？',
    opts:{A:'遙控無人機活動區域',B:'遙控無人機活動時間',C:'其他管理事項',D:'以上皆是'},
    ans:'D',
    exp:'【地點＋時間＋其他，全包選D】縣市政府有完整管理權，三項全都能管：活動區域、活動時間、其他管理事項。\n\n延伸知識：中央主管機關想禁飛，也要提請縣市政府公告（不能自己直接公告）。違反縣市公告的罰款是3萬-15萬。',
    related:['ch1_23','ch1_25','ch1_48']
  },
  'ch1_23': {
    ch:1, num:23, pool:'light',
    text:'中央主管機關認有禁止或限制遙控無人機飛航活動需求者，得提請所在地哪個機關進行公告？',
    opts:{A:'鄉鎮區公所',B:'直轄市、縣（市）政府',C:'地方派出所',D:'地方農會'},
    ans:'B',
    exp:'【中央提請→地方公告】中央想禁飛，要「委託」縣市政府幫忙公告。記憶：中央不能自己直接貼公告，要找地方。',
    related:['ch1_22','ch1_25']
  },
  'ch1_25': {
    ch:1, num:25, pool:'light',
    text:'政府機關（構）、學校或法人因執行業務需於直轄市、縣（市）政府所公告之遙控無人機活動區域、時間及其他管理事項外從事飛航活動者，應申請何者會商相關中央主管機關同意後，始得為之？',
    opts:{A:'直轄市、縣（市）政府',B:'衛福部',C:'農委會',D:'交通部'},
    ans:'A',
    exp:'【誰家地盤找誰申請→縣市政府】縣市政府公告的區域外想飛，就向縣市政府申請。\n\n延伸：如果是跨縣市飛航，要從「起飛地」所在縣市政府提出申請，並取得飛越縣市的同意，不是找終點地的縣市政府。',
    related:['ch1_22','ch1_23','ch1_111']

  'ch1_146': {

  'ch2_3': {

  'ch2_9': {

  'ch2_12': {

    ans:'B',
    exp:'【風速超規格 = 必須立即終止】風速超過機體規格上限時，無人機無法對抗風力保持穩定，極易失控墜落。50%電量仍充足；輕微霧氣視能見度而定；訊號正常不需終止。記憶：超過機體物理限制的條件，就是立即終止的理由。',

  'ch2_18': {
    ch:2, num:18, pool:'heavy',
    text:'關於無人機的重心位置，下列敘述何者正確？',
    opts:{A:'重心越靠近機尾越好',B:'重心應位於升力中心附近',C:'重心位置不影響飛行穩定性',D:'重心越靠近機頭越好'},
    ans:'B',
    exp:'【重心必須接近升力中心】重心（CG）偏離升力中心會造成俯仰力矩，使飛機自動往某方向傾斜。重心太靠機頭→機頭下沉；太靠機尾→機尾下沉，容易失控。理想位置：在升力中心附近，讓機體保持水平平衡。記憶：天平兩端要平衡，重心=支點要在中間。',
    related:[]
  },
  'ch2_26': {
    ch:2, num:26, pool:'heavy',
    text:'下列何者是影響無人機飛行時間的主要因素？',

    ans:'B',
    exp:'【飛行時間 = 電池能量 ÷ 耗電功率】決定飛行時間的核心：①電池容量（mAh越大越久）②飛行重量（越重馬達消耗越多電）③風速（逆風耗電快）。遙控器品牌、攝影機畫素與飛行時間無關。記憶：同一顆電池，機器越重飛越短。',
    related:[]
  },
  'ch2_43': {
    ch:2, num:43, pool:'heavy',
    text:'白努利定理（Bernoulli\'s theorem）說明了流體流速與壓力的關係，下列敘述何者正確？',
    opts:{A:'流速越快，壓力越大',B:'流速越快，壓力越小',C:'流速與壓力無關',D:'壓力越大，流速越大'},
    ans:'B',
    exp:'【白努利：流速↑ → 壓力↓】白努利定理核心：同一流體中，流速快的地方壓力小，流速慢的地方壓力大。機翼上表面弧度大→氣流走得快→壓力低；下表面平→氣流慢→壓力高→產生向上升力。記憶：流速快=壓力小，就像風吹過兩張紙中間，紙會往內夾。',
    related:[]
  },
  'ch2_44': {
    ch:2, num:44, pool:'heavy',
    text:'連續性定理闡述了流體在流動中，下列哪些項目之間的關係？',
    opts:{A:'流速和管道切面',B:'流速和溫度',C:'管道切面和溫度',D:'溫度和壓力'},
    ans:'A',
    exp:'【連續性定理 = 流速 × 截面積 = 常數】管道截面積縮小→流速加快；截面積增大→流速減慢。公式：A1v1 = A2v2。記憶法：用手指堵水管口，出水口面積變小，水柱噴得更遠（流速變快）。這是伯努利原理的前提，也是機翼升力的物理基礎。',
    related:[]
  },
  'ch2_2': {ch:2,num:2,pool:'heavy',text:'遙控無人機系統之飛行載具，包括下列哪些項目？',opts:{A:'機體、負載設備及酬載',B:'機體、燃料或電池',C:'機體、燃料或電池、負載設備及酬載',D:'機體、燃料或電池、負載設備及酬載、遙控設備'},ans:'C',exp:'【飛行載具=機體+燃料/電池+負載設備+酬載，不含遙控設備】遙控設備是地面端，不算飛行載具的一部分。選C。',related:[]},
  'ch2_13': {ch:2,num:13,pool:'light',text:'遙控無人機自主（慣性導航）導航系統有下列哪個缺點？',opts:{A:'操作困難',B:'易受干擾',C:'誤差積累增大',D:'以上皆是'},ans:'C',exp:'【慣性導航缺點=誤差積累】慣性導航不靠外部訊號（GPS、無線電），優點是抗干擾；缺點是積分誤差會越來越大（飛越久越偏）。選C。',related:[]},
  'ch2_19': {ch:2,num:19,pool:'heavy',text:'遙控無人機控制鏈路為保密與抗干擾基本上已全面採行下列哪種方式？',opts:{A:'類比化',B:'模組化',C:'數位化',D:'離散化'},ans:'C',exp:'【控制鏈路=數位化】數位訊號比類比更容易加密和抗干擾，是目前無人機控制鏈路的標準做法。選C。',related:[]},
  'ch2_28': {ch:2,num:28,pool:'heavy',text:'透過旋翼槳葉產生升力，同時也能產生推力的遙控無人機，是下列哪種遙控無人機？',opts:{A:'遙控無人直昇機',B:'遙控無人飛機',C:'遙控無人多旋翼機',D:'以上皆是'},ans:'A',exp:'【旋翼同時產生升力和推力=直升機】直升機主旋翼傾斜可同時產生升力（垂直分量）和推力（水平分量）。多旋翼靠傾斜機身產生前進力，飛機靠固定翼。選A。',related:[]},
  'ch2_29': {ch:2,num:29,pool:'heavy',text:'無人直昇機可以執行下列哪個動作？',opts:{A:'自由調整姿態',B:'定點盤旋',C:'起飛與落地',D:'以上皆是'},ans:'D',exp:'【直升機=以上皆是】直升機能自由調姿、定點盤旋、垂直起降，全部都行，選D。',related:[]},
  'ch2_34': {ch:2,num:34,pool:'heavy',text:'無人飛機於頂風飛行時，地面速度就會有下列哪種變化？',opts:{A:'變快',B:'不變',C:'變慢',D:'以上皆非'},ans:'C',exp:'【頂風（逆風）→地面速度變慢】空速不變，但地面速度=空速-風速，逆風時地面速度減慢。記憶：逆風騎腳踏車，實際前進變慢。選C。',related:[]},
  'ch2_42': {ch:2,num:42,pool:'heavy',text:'飛機等速直線飛行時，縱軸(X軸)方向阻力與推力大小相同方向相反，所以有下列哪種情況？',opts:{A:'橫軸(Y軸)方向合力為零，飛機無升降起伏',B:'垂直軸(Z軸)方向合力為零，飛機無偏航的姿態',C:'縱軸(X軸)方向合力為零，飛機速度不變',D:'以上皆是'},ans:'C',exp:'【推力=阻力→縱軸合力為零→速度不變】等速直線飛行：縱軸推力=阻力（合力零→速度不變），垂直軸升力=重力（合力零→高度不變）。題目說縱軸推力=阻力，結論就是縱軸合力零、速度不變，選C。',related:[]},
  'ch2_45': {ch:2,num:45,pool:'heavy',text:'連續性定理闡述了流體在流動中，流速和管道切面相關，而且下列哪些項目也相關？',opts:{A:'流速和壓力',B:'流速和溫度',C:'管道切面和溫度',D:'溫度和壓力'},ans:'A',exp:'【連續性定理+柏努利=流速、切面、壓力三者相關】連續性定理說切面↓→流速↑；柏努利說流速↑→壓力↓。兩者合起來：流速和壓力也相關，選A。',related:[]},
  'ch2_46': {ch:2,num:46,pool:'heavy',text:'柏努利定律說明流體在一個管道中流動時，有下列哪種現象？',opts:{A:'流速大的地方壓力大，流速小的地方壓力小',B:'流速大的地方壓力大，流速小的地方壓力也大',C:'流速大的地方壓力小，流速小的地方壓力大',D:'流速大的地方壓力小，流速小的地方壓力也小'},ans:'C',exp:'【柏努利：流速↑→壓力↓（反比）】流速快=壓力小，流速慢=壓力大。機翼上表面弧度大→氣流快→壓力低；下表面→氣流慢→壓力高→升力。選C。',related:[]},
  'ch2_47': {ch:2,num:47,pool:'heavy',text:'柏努利定律目的是要闡述流體在流動中時，下列哪些項目間的關係？',opts:{A:'流速和溫度',B:'流速和壓力',C:'溫度和壓力',D:'以上皆非'},ans:'B',exp:'【柏努利=流速和壓力的關係】連續性定理管流速和切面，柏努利管流速和壓力。選B。',related:[]},
  'ch2_51': {ch:2,num:51,pool:'heavy',text:'垂直於相對氣流方向的壓力差之總和就是下列哪種外力？',opts:{A:'槳葉本身的攻角設計',B:'空氣的阻力',C:'機翼的升力',D:'地心引力'},ans:'C',exp:'【垂直相對氣流的壓力差=升力】升力=機翼上下表面壓力差（垂直於氣流方向）。選C。',related:[]},
  'ch2_52': {ch:2,num:52,pool:'heavy',text:'螺旋槳產生的推力是藉由下列哪個項目而成？',opts:{A:'槳葉本身的攻角設計',B:'螺旋槳轉速',C:'以上皆是',D:'以上皆非'},ans:'C',exp:'【推力=攻角設計＋轉速，缺一不可】攻角決定每轉一圈推多少空氣，轉速決定推多快。兩者合起來產生推力，選C。',related:[]},
  'ch2_53': {ch:2,num:53,pool:'heavy',text:'螺旋槳轉速通常以下列哪個項目來表示？',opts:{A:'每秒徑度（rad/s）',B:'每分鐘轉數（RPM）',C:'赫茲 (Hz)',D:'每分鐘徑度（rad/min）'},ans:'B',exp:'【螺旋槳轉速=RPM（每分鐘轉數）】RPM=Revolutions Per Minute。記憶：汽車儀表板也是看RPM。選B。',related:[]},
  'ch2_54': {ch:2,num:54,pool:'heavy',text:'一般螺旋槳攻角最大的位置在槳葉的下列哪個位置？',opts:{A:'槳葉根部',B:'槳葉葉尖',C:'槳葉中尖',D:'以上皆是'},ans:'A',exp:'【根部攻角最大】葉尖線速度快→攻角可以小；根部線速度慢→需要大攻角才能產生足夠升力。選A。',related:[]},
  'ch2_55': {ch:2,num:55,pool:'heavy',text:'飛機螺旋槳在原廠設計時，為了設計出高效率的槳葉角度，係依據發動機及飛機的下列哪些特性做為基礎？',opts:{A:'銷量和價格',B:'耗油量和扭力',C:'壓縮比和衝程',D:'轉速和空速'},ans:'D',exp:'【螺旋槳設計基礎=轉速和空速】轉速決定葉尖速度，空速決定相對氣流，兩者決定最佳攻角。選D。',related:[]},
  'ch2_58': {ch:2,num:58,pool:'heavy',text:'寄生阻力可分為下列哪幾種？',opts:{A:'摩擦阻力',B:'形狀阻力',C:'干擾阻力',D:'以上皆是'},ans:'D',exp:'【阻力口訣】寄生阻力=摩擦（表面）+形狀（前後壓差）+干擾（接合部位）三合一。誘導阻力=升力的代價（另一類）。選D。',related:[]},
  'ch2_59': {ch:2,num:59,pool:'heavy',text:'對於高速遙控無人機而言，除了摩擦阻力、形狀阻力、誘導阻力和干擾阻力外，還會另外產生下列哪種阻力？',opts:{A:'震波阻力',B:'布斯曼阻力',C:'達倫伯特阻力',D:'雷諾阻力'},ans:'A',exp:'【高速（近音速）多一種=震波阻力】震波阻力只在接近音速時才出現。記憶：音爆=震波，高速無人機才有。選A。',related:[]},
  'ch2_61': {ch:2,num:61,pool:'heavy',text:'空氣流經飛機表面發生摩擦，產生一個阻止飛機前進的力，這個力就是下列哪種阻力？',opts:{A:'形狀阻力',B:'誘導阻力',C:'摩擦阻力',D:'干擾阻力'},ans:'C',exp:'【表面摩擦=摩擦阻力】記憶表：摩擦=表面（表面越光滑越小）；形狀=前後壓差；誘導=升力代價；干擾=接合處。選C。',related:[]},
  'ch2_66': {ch:2,num:66,pool:'heavy',text:'由前後壓力差形成的阻力叫下列哪種阻力？',opts:{A:'摩擦阻力',B:'形狀阻力',C:'誘導阻力',D:'干擾阻力'},ans:'B',exp:'【前後壓力差=形狀阻力】流線型機身可減少形狀阻力。記憶：形狀越流線→前後壓差越小→形狀阻力越小。選B。',related:[]},
  'ch2_67': {ch:2,num:67,pool:'heavy',text:'人在逆風中行走，會感到阻力的作用，這就是下列哪種阻力？',opts:{A:'摩擦阻力',B:'誘導阻力',C:'形狀阻力',D:'干擾阻力'},ans:'C',exp:'【逆風走=形狀阻力（前後壓差）】人體正面受風，後方形成低壓區，前後壓力差產生阻力，這就是形狀阻力。選C。',related:[]},
  'ch2_70': {ch:2,num:70,pool:'heavy',text:'誘導阻力是遙控無人機為產生下列哪種外力而須付出的一種代價？',opts:{A:'磁力',B:'推力',C:'升力',D:'重力'},ans:'C',exp:'【誘導阻力=產生升力的代價】有升力就有誘導阻力，升力越大誘導阻力越大。低速時誘導阻力最大（需要更大攻角）。選C。',related:[]},
  'ch2_72': {ch:2,num:72,pool:'light',text:'干擾阻力容易產生在下列哪些組件之間？',opts:{A:'機身和機翼、機身和尾翼',B:'機翼和外掛載',C:'機翼、發動機短艙',D:'以上皆是'},ans:'D',exp:'【干擾阻力=各組件接合處都有】機身接機翼、機身接尾翼、機翼接外掛載、機翼接發動機短艙，凡是兩個組件交接的地方都會產生干擾阻力，選D。',related:[]},
  'ch2_75': {ch:2,num:75,pool:'light',text:'升力和阻力是飛機在空氣之間的下列哪種行為中產生？',opts:{A:'分子光譜',B:'動量守恆',C:'相對運動（相對氣流）',D:'雷諾傳輸'},ans:'C',exp:'【升力阻力來自相對運動（相對氣流）】有相對氣流才有升力和阻力。記憶：飛機靜止在地面沒有升力，動起來才有。選C。',related:[]},
  'ch2_77': {ch:2,num:77,pool:'heavy',text:'相對氣流方向與翼弦所夾的角度叫下列哪個角？',opts:{A:'俯仰角',B:'滾轉角',C:'攻角',D:'偏航角'},ans:'C',exp:'【相對氣流與翼弦夾角=攻角（AoA）】攻角決定升力大小。記憶：攻角越大→升力越大，但超過臨界攻角→失速。選C。',related:[]},
  'ch2_78': {ch:2,num:78,pool:'light',text:'在飛行速度等其它條件相同的情況下，得到最大升力的攻角，叫做下列哪個項目？',opts:{A:'理想攻角',B:'臨界攻角',C:'牛頓攻角',D:'萊布尼茲攻角'},ans:'B',exp:'【最大升力的攻角=臨界攻角】超過臨界攻角就失速，升力反而驟降。記憶：臨界=極限，超過就垮。選B。',related:[]},
  'ch2_79': {ch:2,num:79,pool:'heavy',text:'在小於臨界攻角範圍內增大攻角，會有下列哪種結果？',opts:{A:'升力增大',B:'升力減少',C:'升力不變',D:'以上皆非'},ans:'A',exp:'【小於臨界攻角→攻角↑→升力↑】超過臨界才會失速。記憶：臨界攻角以下，越斜越有力；超過就垮。選A。',related:[]},
  'ch2_80': {ch:2,num:80,pool:'heavy',text:'空氣密度大，相對氣流速度快，升力和阻力會有下列哪種變化？',opts:{A:'升力越大、阻力越小',B:'升力越小、阻力越大',C:'升力和阻力越大',D:'升力和阻力越小'},ans:'C',exp:'【密度大+速度快→升力和阻力都增大】升力阻力公式都含空氣密度和速度平方，兩者越大，升力阻力都越大。選C。',related:[]},
  'ch2_85': {ch:2,num:85,pool:'light',text:'遙控無人機表面光滑狀況會影響下列哪種阻力？',opts:{A:'形狀阻力',B:'誘導阻力',C:'摩擦阻力',D:'干擾阻力'},ans:'C',exp:'【表面光滑→影響摩擦阻力】越光滑→摩擦阻力越小。記憶：摩擦阻力=表面阻力，形狀不影響光滑度。選C。',related:[]},
  'ch2_90': {ch:2,num:90,pool:'light',text:'在無人飛機機翼上一般安裝下列哪個物件？',opts:{A:'光學酬載',B:'副翼和襟翼',C:'通訊設備',D:'導航設備'},ans:'B',exp:'【機翼裝副翼和襟翼】副翼控制滾轉，襟翼增加升力（起降用）。選B。',related:[]},
  'ch2_91': {ch:2,num:91,pool:'heavy',text:'操縱無人飛機副翼可使飛機產生下列哪種結果？',opts:{A:'滾轉',B:'爬升',C:'下降',D:'偏航'},ans:'A',exp:'【副翼→滾轉；升降舵→俯仰；方向舵→偏航】三組對應，背這個就夠了。選A。',related:[]},
  'ch2_92': {ch:2,num:92,pool:'heavy',text:'無人飛機機翼還可安裝下列哪個物件？',opts:{A:'發動機',B:'起落架',C:'外掛載',D:'以上皆是'},ans:'D',exp:'【機翼可裝發動機、起落架、外掛載，全選D】大型飛機的發動機就掛在機翼下方。選D。',related:[]},
  'ch2_93': {ch:2,num:93,pool:'light',text:'無人飛機機身的主要功用是裝載下列哪個物件？',opts:{A:'油箱',B:'酬載',C:'各種設備',D:'以上皆是'},ans:'D',exp:'【機身功用=以上皆是】機身是主結構，油箱、酬載、各種設備都裝在裡面。選D。',related:[]},
  'ch2_94': {ch:2,num:94,pool:'heavy',text:'無人飛機尾翼包括下列哪些物件？',opts:{A:'大尾翼和小尾翼',B:'高速尾翼和低速尾翼',C:'水平尾翼和垂直尾翼',D:'旋轉尾翼和固定尾翼'},ans:'C',exp:'【尾翼=水平+垂直】水平尾翼控俯仰，垂直尾翼控偏航。選C。',related:[]},
  'ch2_95': {ch:2,num:95,pool:'heavy',text:'無人飛機水平尾翼包括下列哪些物件？',opts:{A:'固定的升降舵和可動的水平安定面',B:'固定的水平安定面和可動的升降舵',C:'固定的升降舵和水平安定面',D:'可動的升降舵和水平安定面'},ans:'B',exp:'【水平尾翼=固定水平安定面＋可動升降舵】安定面「固定」，升降舵「可動」。垂直尾翼同理=固定垂直安定面＋可動方向舵。選B。',related:[]},
  'ch2_96': {ch:2,num:96,pool:'heavy',text:'無人飛機垂直尾翼包括下列哪些物件？',opts:{A:'固定的方向舵和可動的垂直安定面',B:'固定的垂直安定面和可動的方向舵',C:'固定的方向舵和垂直安定面',D:'可動的方向舵和垂直安定面'},ans:'B',exp:'【垂直尾翼=固定垂直安定面＋可動方向舵】記憶：安定面固定，舵面可動。選B。',related:[]},
  'ch2_97': {ch:2,num:97,pool:'light',text:'無人飛機的起落架大都由下列哪些物件組成？',opts:{A:'減震支柱和機輪',B:'蒙皮和鉚釘',C:'坡頂桁架和平行弦桁架',D:'拉力元件和扭力元件'},ans:'A',exp:'【起落架=減震支柱＋機輪】選A。',related:[]},
  'ch2_99': {ch:2,num:99,pool:'heavy',text:'動力系統主要用來產生使遙控無人機前進的下列哪些力？',opts:{A:'重力與升力',B:'重力與阻力',C:'拉力和推力',D:'升力與阻力'},ans:'C',exp:'【動力系統產生=拉力和推力】螺旋槳在前=拉力；螺旋槳在後=推力。都是讓飛機前進的力。選C。',related:[]},
  'ch2_100': {ch:2,num:100,pool:'heavy',text:'無人飛機常見的動力系統有下列哪個項目？',opts:{A:'航空活塞式發動機加螺旋槳推進器',B:'渦輪噴氣發動機',C:'渦輪螺旋槳發動機和渦輪扇或導風扇發動機',D:'以上皆是'},ans:'D',exp:'【無人飛機動力系統=以上皆是】各種發動機都有用到。選D。',related:[]},
  'ch2_103': {ch:2,num:103,pool:'heavy',text:'想像為一條由前往後穿過航空器的軸，稱之為下列哪個軸？',opts:{A:'航空器縱軸（X軸）',B:'航空器橫軸（Y軸）',C:'航空器垂直軸（Z軸）',D:'以上皆非'},ans:'A',exp:'【三軸記憶：縱(X)前後=滾轉；橫(Y)左右=俯仰；垂直(Z)上下=偏航】前後穿過=縱軸X軸，對應滾轉動作。選A。',related:[]},
  'ch2_104': {ch:2,num:104,pool:'heavy',text:'除了副翼，航空器的下列哪個組件對於航空器的滾轉也會有影響？',opts:{A:'升降舵',B:'襟翼',C:'方向舵',D:'小翼'},ans:'C',exp:'【方向舵也會影響滾轉】方向舵產生偏航→偏航帶動滾轉（交叉耦合）。選C。',related:[]},
  'ch2_113': {ch:2,num:113,pool:'heavy',text:'遙控無人機操作有哪四大基本動作？',opts:{A:'平直飛行、側滑、爬升、下降',B:'平直飛行、轉彎、爬升、倒飛',C:'平直飛行、轉彎、爬升、下降',D:'平直飛行、側滑、懸停、倒飛'},ans:'C',exp:'【四大基本：平直、轉彎、爬升、下降】選C。記憶：最基本的飛行動作，沒有側滑、倒飛、懸停。',related:[]},
  'ch2_114': {ch:2,num:114,pool:'heavy',text:'操作遙控無人飛機時，當副翼控制右上左下，機體相對於「機體中心」作下列哪種動作？',opts:{A:'向上俯仰',B:'右偏航',C:'右滾',D:'左滾'},ans:'C',exp:'【副翼右上左下→右滾】右邊副翼上偏→右翼升力減少→右翼下沉→右滾。記憶：哪邊翼上偏哪邊就往下沉（往那邊滾）。選C。',related:[]},
  'ch2_115': {ch:2,num:115,pool:'heavy',text:'操作遙控無人飛機時，當副翼控制右下左上，機體相對於「機體中心」作下列哪種動作？',opts:{A:'向上俯仰',B:'右偏航',C:'左滾',D:'右滾'},ans:'B',exp:'【依PDF答案選B：右偏航】請對照題庫原文確認選項。',related:[]},
  'ch2_116': {ch:2,num:116,pool:'heavy',text:'操作遙控無人飛機時，當方向舵控制往右，機體相對於「機體中心」作下列哪種動作？',opts:{A:'向上俯仰',B:'右偏航',C:'左偏航',D:'右滾'},ans:'B',exp:'【方向舵往右→右偏航】方向舵往右，尾部往右推，機頭往右轉→右偏航。選B。',related:[]},
  'ch2_117': {ch:2,num:117,pool:'heavy',text:'操作遙控無人飛機時，當方向舵控制往左，機體相對於「機體中心」作下列哪種動作？',opts:{A:'右滾',B:'左偏航',C:'右偏航',D:'左滾'},ans:'B',exp:'【方向舵往左→左偏航】選B。',related:[]},
  'ch2_124': {ch:2,num:124,pool:'heavy',text:'無人直昇機主旋翼的槳葉片的俯仰角愈大，就會有下列哪種情形？',opts:{A:'升力愈大，扭力愈小',B:'升力愈大，扭力也愈大',C:'升力愈小，也扭力愈小',D:'升力愈小，扭力愈大'},ans:'B',exp:'【俯仰角↑→升力↑，扭力也↑】更大的槳葉角度需要更多扭力才能維持轉速，升力和扭力一起增大。選B。',related:[]},
  'ch2_125': {ch:2,num:125,pool:'heavy',text:'無人直昇機的尾旋翼主要功能為何？',opts:{A:'抵消升力，控制機頭方向',B:'抵消阻力，控制機頭方向',C:'抵消扭力，控制機頭方向',D:'抵消重力，控制機頭方向'},ans:'C',exp:'【尾旋翼=抵消扭力＋控制機頭方向】主旋翼轉動會讓機身反轉（扭力），尾旋翼產生側向推力來平衡。選C。',related:[]},
  'ch2_129': {ch:2,num:129,pool:'heavy',text:'無人直昇機「懸停轉彎」，係指保持不變的下列哪種狀態？',opts:{A:'高度',B:'轉彎率',C:'轉速',D:'以上皆是'},ans:'A',exp:'【直升機飛行狀態比較表】懸停轉彎=保持高度不變（只轉方向）；側向/向後懸停=高度+航向+速度全保持（以上皆是）；平直飛行=高度+航向不變；傾斜轉彎=高度不變但航向改變。選A。',related:[]},
  'ch2_132': {ch:2,num:132,pool:'heavy',text:'當必須移動無人直昇機到另一特定位置，但當時狀況不可能執行向前飛行時，就要使用下列哪種動作？',opts:{A:'側向懸停飛行或向後懸停飛行',B:'懸停轉彎',C:'平直飛行',D:'懸停'},ans:'A',exp:'【不能向前→改用側向或向後懸停飛行】選A。',related:[]},
  'ch2_133': {ch:2,num:133,pool:'heavy',text:'無人直昇機「側向懸停飛行」，係指保持不變的下列哪種狀態？',opts:{A:'地面速度',B:'高度',C:'航向',D:'以上皆是'},ans:'D',exp:'【側向懸停飛行=高度+航向+速度全部不變】只是往側面移動，高度航向速度都維持。選D。',related:[]},
  'ch2_134': {ch:2,num:134,pool:'heavy',text:'當必須移動無人直昇機到另一特定位置，但當時狀況不可能執行向前或側向懸停飛行時，就要使用下列哪種動作？',opts:{A:'平直飛行',B:'向後懸停飛行',C:'懸停轉彎',D:'傾斜轉彎'},ans:'B',exp:'【不能向前也不能側向→向後懸停飛行】選B。',related:[]},
  'ch2_135': {ch:2,num:135,pool:'heavy',text:'無人直昇機「向後懸停飛行」，係指保持不變的下列哪種狀態？',opts:{A:'地面速度',B:'高度',C:'航向',D:'以上皆是'},ans:'D',exp:'【向後懸停飛行=高度+航向+速度全部不變】和側向懸停一樣，全部保持，選D。',related:[]},
  'ch2_136': {ch:2,num:136,pool:'heavy',text:'無人直昇機「平直飛行」，係指保持下列哪種狀態？',opts:{A:'高度不變和航向不變',B:'高度不變和地面速度不變',C:'地面速度不變和航向不變',D:'主旋翼轉速不變和航向不變'},ans:'A',exp:'【平直飛行=高度不變＋航向不變】記憶：平（高度平）直（方向直），選A。',related:[]},
  'ch2_137': {ch:2,num:137,pool:'heavy',text:'無人直昇機「傾斜轉彎」，係指保持在向左或向右的傾斜狀態，保持下列哪種狀態之飛行？',opts:{A:'高度不變和航向不變',B:'高度改變，但航向不變',C:'高度不變，但航向改變',D:'高度改變和航向改變'},ans:'C',exp:'【傾斜轉彎=高度不變，但航向改變】傾斜=保持傾斜角（高度不動）；轉彎=航向改變。選C。',related:[]},
  'ch2_138': {ch:2,num:138,pool:'light',text:'無人直昇機「偏航」，係指利用尾旋翼推力執行下列哪種操縱？',opts:{A:'改變高度',B:'改變航向',C:'改變地面速度',D:'改變升力'},ans:'B',exp:'【直升機偏航=尾旋翼改變航向】尾旋翼推力增減→機身往反方向轉→改變機頭方向（航向）。選B。',related:[]},
  'ch2_140': {ch:2,num:140,pool:'heavy',text:'無人多旋翼機能夠垂直且穩定的執行下列哪種動作？',opts:{A:'滾轉及水平平移',B:'升降及偏航',C:'偏航及水平平移',D:'俯仰及水平平移'},ans:'B',exp:'【多旋翼機特長=垂直升降＋偏航】多旋翼機垂直起降和偏航都很穩，選B。',related:[]},
  'ch2_141': {ch:2,num:141,pool:'heavy',text:'無人多旋翼機具備優秀的下列哪種能力是一般無人飛機望塵莫及的？',opts:{A:'垂直起降能力',B:'定點懸停能力',C:'穩定升降及偏航',D:'以上皆是'},ans:'D',exp:'【多旋翼機優勢=以上皆是】垂直起降、定點懸停、穩定升降偏航，固定翼飛機做不到。選D。',related:[]},
  'ch2_142': {ch:2,num:142,pool:'heavy',text:'無人多旋翼機的下列哪種旋翼設計使得操控簡單且直接？',opts:{A:'參差配置的',B:'對稱的',C:'不對稱的',D:'偏一邊的'},ans:'B',exp:'【多旋翼=對稱設計】對稱配置讓各旋翼力矩互相平衡，操控直觀。選B。',related:[]},
  'ch2_143': {ch:2,num:143,pool:'heavy',text:'定距槳無人多旋翼機與無人直昇機相比，在下列哪個方面有很大提升？',opts:{A:'機械設計結構',B:'控制難度',C:'姿態平穩',D:'以上皆是'},ans:'A',exp:'【多旋翼相比直升機=機械結構大幅簡化】定距槳不需要直升機那複雜的旋翼頭機構，機械結構簡單很多。選A。',related:[]},
  'ch2_145': {ch:2,num:145,pool:'heavy',text:'無人多旋翼機同時增加或減少每個旋翼的升力，來實現下列哪種飛行狀態？',opts:{A:'垂直的升降姿態',B:'俯仰的姿態',C:'偏航的姿態',D:'滾轉的姿態'},ans:'A',exp:'【多旋翼姿態口訣】全部同增減=升降；前後不平衡=俯仰；左右不平衡=滾轉；斜對角不平衡=偏航。選A。',related:[]},
  'ch2_146': {ch:2,num:146,pool:'heavy',text:'同時影響遙控無人機飛行性能與飛航安全的重要因素是下列哪些項目？',opts:{A:'機體大小',B:'電池容量',C:'重量和重心位置',D:'以上皆是'},ans:'C',exp:'【最重要的兩個因素=重量和重心位置】這兩個直接影響飛行性能和安全。選C。',related:[]},
  'ch2_149': {ch:2,num:149,pool:'light',text:'遙控無人機重力的著力點稱為下列哪個項目？',opts:{A:'形心',B:'氣動力中心',C:'重心',D:'升力中心'},ans:'C',exp:'【重力著力點=重心（CG）】選C。',related:[]},
  'ch2_152': {ch:2,num:152,pool:'heavy',text:'遙控無人機飛行時，為產生各種姿態，作用於機身上的力為下列哪種情形？',opts:{A:'升力通常較重量為大',B:'升力通常較重量為小',C:'有時升力較大，有時重量較大',D:'以上皆非'},ans:'C',exp:'【各種姿態=升力和重量大小會變換】爬升時升力>重力，俯衝時重力>升力，平飛時相等。所以是有時大有時小，選C。',related:[]},
  'ch2_154': {ch:2,num:154,pool:'heavy',text:'遙控無人機轉彎時，需執行下列哪個動作以補償升力的不足？',opts:{A:'增加正向力',B:'增加攻角',C:'增加扭力',D:'增加離心力'},ans:'B',exp:'【轉彎時升力不足→增加攻角補償】轉彎時升力有水平分量（提供向心力），垂直分量變少→需增加攻角以補足垂直升力維持高度。選B。',related:[]},
  'ch2_155': {ch:2,num:155,pool:'heavy',text:'無人飛機重心位置靠前時，為維持遙控無人機的俯仰平衡，需要尾翼提供下列哪種力？',opts:{A:'更大的向前的推力',B:'更大的向上的升力',C:'更大的向下的升力',D:'更大的向外的離心力'},ans:'C',exp:'【重心靠前→尾翼需向下升力來平衡】重心太前機頭下壓，尾翼需產生向下的力把機尾往下壓（等於把機頭抬起來）。選C。',related:[]},
  'ch2_157': {ch:2,num:157,pool:'heavy',text:'無人飛機重心位置靠前時，會有下列哪種情形？',opts:{A:'減少誘導阻力',B:'增大誘導阻力',C:'誘導阻力不變',D:'以上皆非'},ans:'B',exp:'【重心靠前→增大誘導阻力】重心靠前需尾翼向下力配平→整體攻角增大→誘導阻力增大。選B。',related:[]},
  'ch2_158': {ch:2,num:158,pool:'light',text:'無人飛機重心位置靠前時，會有下列哪種情形？',opts:{A:'油耗增加',B:'航程距離降低',C:'以上皆是',D:'以上皆非'},ans:'C',exp:'【重心靠前→誘導阻力增大→油耗增加→航程降低】兩個壞結果都有，選C。',related:[]},
  'ch2_162': {ch:2,num:162,pool:'heavy',text:'無人飛機重心後移時，配平及總阻力減小，也進而導致下列哪種情形？',opts:{A:'油耗減少',B:'續航能力增加',C:'失速速度減小',D:'以上皆是'},ans:'D',exp:'【重心後移好處=油耗減少＋續航增加＋失速速度減小，但穩定性變差！】三個都對，選D。注意重心太後=穩定性差，有失控風險。',related:[]},
  'ch2_163': {ch:2,num:163,pool:'heavy',text:'無人直昇機重心太靠後，會影響下列哪種性能？',opts:{A:'高速前飛性能及穩定',B:'從地面到正常起飛',C:'平直飛行',D:'以上皆是'},ans:'A',exp:'【直升機重心靠後→影響高速前飛性能和穩定】機頭抬高，向前飛行困難。選A。',related:[]},
  'ch2_164': {ch:2,num:164,pool:'light',text:'無人多旋翼機重心移動可能造成下列哪種結果？',opts:{A:'升力增加',B:'操控較為困難',C:'阻力減少',D:'以上皆是'},ans:'B',exp:'【多旋翼重心移動→操控困難】重心偏移讓各旋翼需要補償，操控變複雜。選B。',related:[]},
  'ch2_165': {ch:2,num:165,pool:'heavy',text:'遙控無人機重量增加可能對起飛速度造成下列哪種結果？',opts:{A:'降低起飛速度',B:'起飛速度不變',C:'提高起飛速度',D:'以上皆非'},ans:'C',exp:'【重量↑→起飛速度↑】需要更快的速度才能產生足夠升力起飛。記憶：越重越難飛，起飛要衝更快。選C。',related:[]},
  'ch2_168': {ch:2,num:168,pool:'heavy',text:'遙控無人機重量增加可能對飛航最高高度造成下列哪種結果？',opts:{A:'降低飛航最高高度',B:'增加飛航最高高度',C:'飛航最高高度不變',D:'以上皆非'},ans:'A',exp:'【重量↑→最高高度↓】越重發動機越難爬升到高空，最高高度降低。選A。',related:[]},
  'ch2_169': {ch:2,num:169,pool:'heavy',text:'遙控無人機重量增加可能對操作性能造成下列哪種結果？',opts:{A:'操作性能不變',B:'增加操作性能',C:'降低操作性能',D:'以上皆非'},ans:'C',exp:'【重量↑→操作性能↓】越重越難靈活操控。選C。',related:[]},
  'ch2_173': {ch:2,num:173,pool:'heavy',text:'低速、低空的中型無人機的動力裝置，使用下列哪種發動機？',opts:{A:'往復式（活塞）發動機',B:'無刷電動馬達',C:'渦輪螺旋槳發動機',D:'渦輪發動機'},ans:'A',exp:'【發動機配對表】低速低空中型=往復式活塞；娛樂/小型=無刷電動馬達；高速=渦輪（推重比高）；高空長滯空大型=渦輪風扇/螺旋槳。低速低空中型選A。',related:[]},
  'ch2_174': {ch:2,num:174,pool:'heavy',text:'使用於高速無人機上，推重比高但壽命短的動力裝置是下列哪種發動機？',opts:{A:'渦輪發動機',B:'無刷電動馬達',C:'渦輪螺旋槳發動機',D:'往復式（活塞）發動機'},ans:'A',exp:'【高速+推重比高+壽命短=渦輪發動機】選A。',related:[]},
  'ch2_175': {ch:2,num:175,pool:'heavy',text:'高空或長滯空的大型無人機的動力裝置，使用下列哪種發動機？',opts:{A:'渦輪發動機',B:'無刷電動馬達',C:'渦輪風扇或渦輪螺旋槳發動機',D:'往復式（活塞）發動機'},ans:'C',exp:'【高空長滯空大型=渦輪風扇或渦輪螺旋槳】選C。',related:[]},
  'ch2_176': {ch:2,num:176,pool:'heavy',text:'娛樂/運動級航空模型或小型無人機的動力裝置，一般使用下列哪種發動機？',opts:{A:'渦輪發動機',B:'無刷電動馬達',C:'渦輪風扇或渦輪螺旋槳發動機',D:'往復式（活塞）發動機'},ans:'B',exp:'【娛樂/小型=無刷電動馬達】消費級無人機幾乎都是電動。選B。',related:[]},
  'ch2_177': {ch:2,num:177,pool:'heavy',text:'隨著渦輪發動機推重比、壽命不斷提高、油耗降低，未來渦輪發動機可能取代下列哪種發動機成為25公斤至150公斤級的無人機之主要動力？',opts:{A:'無刷電動馬達',B:'渦輪風扇發動機',C:'渦輪螺旋槳發動機',D:'活塞發動機'},ans:'D',exp:'【渦輪取代活塞】25-150公斤目前是活塞式主力，未來渦輪性能提升可能取代。選D。',related:[]},
  'ch2_178': {ch:2,num:178,pool:'heavy',text:'一般遙控無人機目前多以下列哪些頻段進行控制與圖傳？',opts:{A:'300MHz或500MHz',B:'500MHz或600MHz',C:'2.4GHz或5.8GHz',D:'100GHz或220GHz'},ans:'C',exp:'【無人機頻段=2.4GHz控制＋5.8GHz圖傳】2.4G=上行控制（手→機）；5.8G=下行圖傳（機→手）。選C。',related:[]},
  'ch2_179': {ch:2,num:179,pool:'heavy',text:'頻段2.4GHz主要為下列哪種鏈路實現對遙控無人機控制？',opts:{A:'下行鏈路',B:'上行控制鏈路',C:'加密鏈路',D:'以上皆是'},ans:'B',exp:'【2.4GHz=上行控制鏈路】上行=地面→飛機（控制指令）。5.8GHz=下行（飛機→地面圖像）。選B。',related:[]},
  'ch2_180': {ch:2,num:180,pool:'heavy',text:'頻段5.8GHz主要為下列哪種鏈路執行圖像或數據傳輸等遙測功能？',opts:{A:'下行鏈路',B:'上行控制鏈路',C:'加密鏈路',D:'以上皆是'},ans:'A',exp:'【5.8GHz=下行鏈路】下行=飛機→地面（回傳影像和數據）。選A。',related:[]},
  'ch2_182': {ch:2,num:182,pool:'heavy',text:'當物體受到所施加的力等於每次的動量變化，這就是下列哪個定律？',opts:{A:'牛頓第一定律又稱「慣性定律」',B:'牛頓第二定律又稱「加速度定律」',C:'牛頓第三定律',D:'以上皆非'},ans:'B',exp:'【牛頓三定律速記】一=慣性（靜者恆靜動者恆動）；二=F=ma（力=動量變化，加速度與力成正比與質量成反比）；三=作用力=反作用力（螺旋槳推力原理）。力=動量變化=第二定律，選B。',related:[]},
  'ch2_183': {ch:2,num:183,pool:'heavy',text:'牛頓第二定律說明加速度與物體的質量為下列哪種關係？',opts:{A:'成反比',B:'成正比',C:'沒有關係',D:'以上皆非'},ans:'A',exp:'【F=ma → a=F/m → 加速度與質量成反比】質量越大，同樣的力產生的加速度越小。選A。',related:[]},
  'ch2_184': {ch:2,num:184,pool:'heavy',text:'牛頓第二定律說明加速度與所施加的力為下列哪種關係？',opts:{A:'成反比',B:'成正比',C:'沒有關係',D:'以上皆非'},ans:'B',exp:'【F=ma → a=F/m → 加速度與力成正比】力越大，加速度越大。選B。',related:[]},
  'ch2_185': {ch:2,num:185,pool:'heavy',text:'對於每一個作用力，都有一個相等且相反的反作用力，這就是下列哪個定律？',opts:{A:'牛頓第一定律又稱「慣性定律」',B:'牛頓第三定律',C:'牛頓第二定律又稱「加速度定律」',D:'以上皆非'},ans:'B',exp:'【作用力=反作用力=牛頓第三定律】螺旋槳往後推氣流（作用力），氣流反推飛機向前（反作用力）。選B。',related:[]},
  'ch2_186': {ch:2,num:186,pool:'heavy',text:'下列哪些理論可以說明一個重於空氣的航空器如何產生升力飛行於空中？',opts:{A:'流體的連續性和柏努利定律',B:'氣候學和大氣化學',C:'大氣動力學和大氣物理學',D:'材料力學和運動學'},ans:'A',exp:'【升力理論=連續性定理＋柏努利定律】連續性→管道縮小流速增加；柏努利→流速增加壓力減小→上表面壓力小→升力產生。選A。',related:[]},
  'ch2_187': {ch:2,num:187,pool:'heavy',text:'流體的連續性說明在同一時間內，流進任一切面和從另一切面流出的下列哪個項目是相等的？',opts:{A:'流體溫度',B:'流體壓力',C:'流體質量',D:'流體速度'},ans:'C',exp:'【連續性定理=流入流出質量相等】A₁v₁ρ₁=A₂v₂ρ₂（質量守恆）。不可壓縮流體中，截面積×速度=常數。選C。',related:[]},
  'ch2_188': {ch:2,num:188,pool:'heavy',text:'由螺旋槳所產生的拉力或噴射發動機所產生的推力，使航空器前進飛行，是依據下列哪個定律？',opts:{A:'牛頓第三定律',B:'牛頓第一定律',C:'牛頓第二定律',D:'以上皆是'},ans:'A',exp:'【螺旋槳推力=牛頓第三定律（作用反作用）】槳葉推氣→氣反推飛機前進。選A。',related:[]},
  'ch2_189': {ch:2,num:189,pool:'heavy',text:'若螺旋槳整片槳葉的攻角都一樣，將使得槳葉的效率有下列哪種變化？',opts:{A:'變得很好',B:'保持不變',C:'變得很差',D:'機時好時差'},ans:'C',exp:'【攻角全相同→效率很差】葉尖速度快需小攻角，根部速度慢需大攻角，統一攻角必有很多地方不在最佳工作點，效率變差。選C。',related:[]},
  'ch2_190': {ch:2,num:190,pool:'heavy',text:'超過臨界攻角後，再增大攻角，會有下列哪種結果？',opts:{A:'升力反而減小，阻力急劇增大',B:'升力持續增大，阻力急劇減小',C:'升力、阻力持續增大',D:'升力、阻力急劇減小'},ans:'A',exp:'【超過臨界攻角=失速！升力驟降，阻力暴增】氣流分離→升力消失→阻力爆增→失速。記憶：臨界以下升力增，超過就垮，選A。',related:[]},
  'ch2_191': {ch:2,num:191,pool:'heavy',text:'升力和阻力兩者與飛行速度的關係是下列哪種？',opts:{A:'均與飛行速度成正比',B:'均與飛行速度成反比',C:'均與飛行速度的平方成正比',D:'均與飛行速度的平方成反比'},ans:'C',exp:'【升力和阻力都與速度的平方成正比】速度加倍→升力阻力都變4倍（2²=4）。選C。',related:[]},
  'ch2_192': {ch:2,num:192,pool:'heavy',text:'放下遙控無人飛機襟翼可產生下列哪種結果？',opts:{A:'使升力增大',B:'使升力減少',C:'使升力不變',D:'以上皆非'},ans:'A',exp:'【放下襟翼→升力增大】襟翼增加翼面彎度和面積，低速時補充升力（起降時使用）。選A。',related:[]},
  'ch2_193': {ch:2,num:193,pool:'heavy',text:'尾翼的作用是操縱無人飛機的下列哪些動作？',opts:{A:'俯仰和滾轉',B:'滾轉和偏航',C:'俯仰和偏航',D:'以上皆非'},ans:'C',exp:'【尾翼=俯仰（升降舵）＋偏航（方向舵）】滾轉由副翼控制，不是尾翼。選C。',related:[]},
  'ch2_194': {ch:2,num:194,pool:'heavy',text:'航空器主要係利用副翼改變下列哪種姿態？',opts:{A:'俯仰',B:'左右滾轉',C:'偏航',D:'以上皆是'},ans:'B',exp:'【副翼→左右滾轉】選B。三軸：副翼=滾轉，升降舵=俯仰，方向舵=偏航。',related:[]},
  'ch2_195': {ch:2,num:195,pool:'heavy',text:'想像為一條左右兩側穿過航空器的軸，稱之為下列哪個軸？',opts:{A:'航空器縱軸（X軸）',B:'航空器垂直軸（Z軸）',C:'航空器橫軸（Y軸）',D:'以上皆非'},ans:'C',exp:'【左右穿過=橫軸Y軸（俯仰軸）】縱(X)前後=滾轉；橫(Y)左右=俯仰；垂直(Z)上下=偏航。選C。',related:[]},
  'ch2_196': {ch:2,num:196,pool:'heavy',text:'航空器利用升降舵改變下列哪種姿態？',opts:{A:'左右滾轉',B:'俯仰',C:'偏航',D:'以上皆非'},ans:'B',exp:'【升降舵=俯仰】選B。',related:[]},
  'ch2_197': {ch:2,num:197,pool:'heavy',text:'航空器利用方向舵改變下列哪種姿態？',opts:{A:'俯仰',B:'偏航',C:'左右滾轉',D:'以上皆非'},ans:'B',exp:'【方向舵=偏航】選B。',related:[]},
  'ch2_198': {ch:2,num:198,pool:'heavy',text:'作用於遙控無人機的各外力之和、各力矩之和都為零，是指遙控無人機的下列哪種特性？',opts:{A:'穩定性',B:'操縱性',C:'平衡性',D:'以上皆非'},ans:'C',exp:'【各力和力矩為零=平衡性】穩定性=受擾後自動恢復；操縱性=對操控的響應；平衡性=各力平衡靜態。選C。',related:[]},
  'ch2_199': {ch:2,num:199,pool:'heavy',text:'當遙控無人機受到微小擾動而偏離原來的平衡狀態時，在擾動消失後，不經操作人操縱，自動恢復原來平衡狀態的特性，是指遙控無人機的下列哪種特性？',opts:{A:'平衡性',B:'穩定性',C:'操縱性',D:'以上皆非'},ans:'B',exp:'【受擾後自動恢復=穩定性】記憶：穩定=自動穩定；平衡=靜態各力為零；操縱=對操控有反應。選B。',related:[]},
  'ch2_200': {ch:2,num:200,pool:'heavy',text:'操作無人飛機時，當升降舵控制往上，相對於「機體中心」作下列哪種動作？',opts:{A:'向下俯仰',B:'向上俯仰',C:'右滾',D:'左滾'},ans:'B',exp:'【升降舵往上→機頭往上（向上俯仰）】升降舵上偏→尾翼向上推→機尾被壓→機頭抬起→向上俯仰。選B。',related:[]},
  'ch2_201': {ch:2,num:201,pool:'heavy',text:'操作無人飛機時，當升降舵控制往下，飛機相對於「機體中心」作下列哪種動作？',opts:{A:'向下俯仰',B:'向上俯仰',C:'右滾',D:'左滾'},ans:'A',exp:'【升降舵往下→向下俯仰】機頭下壓。選A。',related:[]},
  'ch2_202': {ch:2,num:202,pool:'heavy',text:'當無人直昇機的發動機讓主旋翼以逆時針方向旋轉時，無人直昇機本身將以下列哪個方向旋轉？',opts:{A:'以順時針方向旋轉',B:'以逆時針方向旋轉',C:'先以順時針方向旋轉，再以逆時針方向旋轉',D:'先以逆時針方向旋轉，再以順時針方向旋轉'},ans:'A',exp:'【主旋翼逆時針→機身順時針（反扭力）】牛頓第三定律：旋翼逆時針轉，反作用力讓機身順時針轉，所以需要尾旋翼抵消。選A。',related:[]},
  'ch2_203': {ch:2,num:203,pool:'heavy',text:'無人直昇機為了抵銷扭力，在設計上使用尾旋翼在機尾產生一個向右的力，稱為下列哪種力？',opts:{A:'尾旋翼升力',B:'尾旋翼阻力',C:'尾旋翼推力',D:'尾旋翼壓力'},ans:'C',exp:'【尾旋翼產生向右的力=尾旋翼推力】尾旋翼像側裝的螺旋槳，產生向側的推力來平衡反扭力。選C。',related:[]},
  'ch2_204': {ch:2,num:204,pool:'heavy',text:'無人直昇機「懸停」，係指保持幾乎不動的飛行，並保持下列哪種狀態？',opts:{A:'主旋翼轉速不變和航向不變',B:'高度不變和航向不變',C:'主旋翼轉速不變和高度不變',D:'以上皆非'},ans:'B',exp:'【懸停=高度不變＋航向不變】懸停就是固定在空中某一點，高度和方向都不動。選B。',related:[]},
  'ch2_205': {ch:2,num:205,pool:'heavy',text:'無人直昇機「從懸停到正常起飛」，係指有順序的轉換到向前飛行，執行時應安全且迅速的採取下列哪種動作？',opts:{A:'改變航向',B:'增加地面速度',C:'增加高度',D:'增加主旋翼轉速'},ans:'C',exp:'【懸停→正常起飛=增加高度】從懸停轉換到向前飛行，先安全增加高度再轉換飛行。選C。',related:[]},
  'ch2_206': {ch:2,num:206,pool:'heavy',text:'無人直昇機「從地面到正常起飛」，係指使用下列哪個動作，將直昇機從地面移動到有效轉換升力及正常爬升？',opts:{A:'最小的所需動力',B:'最大的所需動力',C:'最小的地面速度',D:'最大的地面速度'},ans:'A',exp:'【地面到正常起飛=最小所需動力】使用能起飛的最小動力，安全起飛。選A。',related:[]},
  'ch2_207': {ch:2,num:207,pool:'heavy',text:'無人多旋翼機是一種經由多個定距槳的正反旋轉與轉速控制，提供下列哪些性能調整？',opts:{A:'阻力與推力調整',B:'重心與阻力調整',C:'升力與姿態調整',D:'升力與重心調整'},ans:'C',exp:'【多旋翼=升力與姿態調整】正反旋轉消除反扭力，轉速控制升力大小和姿態。選C。',related:[]},

// ─── STATE ──────────────────────────────────────────────────────────────────
let state = {
  pool: 'mixed',
  count: 10,
  chapter: 1,
  queue: [],
  current: 0,
  correct: 0,
  wrong: 0,
  wrongIds: [],
  answered: false,
  ovFilter: 'all'
};

// ─── localStorage ────────────────────────────────────────────────────────────
function getErrors() {
  try { return JSON.parse(localStorage.getItem('drone_errors') || '{}'); } catch(e) { return {}; }
}
function saveErrors(e) {
  localStorage.setItem('drone_errors', JSON.stringify(e));
}
function incError(id) {
  const e = getErrors();
  e[id] = (e[id] || 0) + 1;
  saveErrors(e);
}

// ─── ROUTING ─────────────────────────────────────────────────────────────────
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
  if (id === 'screen-overview') renderOverview();
  if (id === 'screen-errors') renderErrors();
  if (id === 'screen-home') updateHomeStats();
}

// ─── COUNTDOWN ───────────────────────────────────────────────────────────────
function updateCountdown() {
  // Exam: 2026-04-21 afternoon, assume 14:00
  const exam = new Date('2026-04-21T14:00:00+08:00');
  const now = new Date();
  const diff = exam - now;
  const el = document.getElementById('countdown-val');
  if (diff <= 0) { el.textContent = '考試時間到！'; return; }
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  el.textContent = h + 'h ' + m + 'm';
  el.parentElement.querySelector('.countdown-unit').textContent = '';
}

// ─── HOME ────────────────────────────────────────────────────────────────────
function updateHomeStats() {
  const all = Object.values(QUESTIONS);
  document.getElementById('stat-light').textContent = all.filter(q=>q.pool==='light').length;
  document.getElementById('stat-heavy').textContent = all.filter(q=>q.pool==='heavy').length;
}

// ─── SETUP ───────────────────────────────────────────────────────────────────
function selectPool(p) {
  state.pool = p;
  ['light','heavy','mixed'].forEach(x => {
    document.getElementById('pool-'+x).classList.toggle('selected', x===p);
  });
}
function selectChap(c) { state.chapter = c; }
function changeCount(d) {
  const all = getPoolIds(state.pool);
  state.count = Math.max(5, Math.min(all.length, state.count + d));
  document.getElementById('count-display').textContent = state.count;
}

// ─── QUIZ ────────────────────────────────────────────────────────────────────
function getPoolIds(pool) {
  const all = Object.values(QUESTIONS);
  if (pool === 'light') return all.filter(q=>q.pool==='light').map(q=>'ch'+q.ch+'_'+q.num);
  if (pool === 'heavy') return all.filter(q=>q.pool==='heavy').map(q=>'ch'+q.ch+'_'+q.num);
  // mixed: 70% heavy, 30% light
  return all.map(q=>'ch'+q.ch+'_'+q.num);
}

function buildQueue(pool, count) {
  const all = Object.values(QUESTIONS);
  let heavy = all.filter(q=>q.pool==='heavy').map(q=>'ch'+q.ch+'_'+q.num);
  let light = all.filter(q=>q.pool==='light').map(q=>'ch'+q.ch+'_'+q.num);
  let ids = [];
  if (pool === 'light') ids = [...light];
  else if (pool === 'heavy') ids = [...heavy];
  else {
    // mixed: 70% heavy, 30% light
    const hn = Math.round(count * 0.7);
    const ln = count - hn;
    const sh = shuffle([...heavy]).slice(0, hn);
    const sl = shuffle([...light]).slice(0, ln);
    ids = shuffle([...sh, ...sl]);
  }
  return shuffle(ids).slice(0, Math.min(count, ids.length));
}

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  state.queue = buildQueue(state.pool, state.count);
  state.current = 0;
  state.correct = 0;
  state.wrong = 0;
  state.wrongIds = [];
  goTo('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const id = state.queue[state.current];
  const q = QUESTIONS[id];
  state.answered = false;

  const poolLabel = {'light':'🔵 一點點不熟','heavy':'🔴 很不熟','mixed':'🟣 混合'}[state.pool];
  document.getElementById('quiz-pool-tag').textContent = poolLabel + '　　第' + q.ch + '章';
  document.getElementById('quiz-progress-label').textContent = '第 '+(state.current+1)+' / '+state.queue.length+' 題';
  document.getElementById('quiz-score-label').textContent = '✅ '+state.correct+'　❌ '+state.wrong;
  document.getElementById('progress-fill').style.width = (state.current/state.queue.length*100)+'%';
  document.getElementById('q-num').textContent = '第 '+q.ch+' 章　第 '+q.num+' 題';
  document.getElementById('q-text').textContent = q.text;

  const ol = document.getElementById('options-list');
  ol.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const div = document.createElement('div');
    div.className = 'option-item';
    div.id = 'opt-'+letter;
    div.innerHTML = '<span class="option-letter">'+letter+'</span><span class="option-text">'+q.opts[letter]+'</span>';
    div.onclick = () => selectAnswer(letter);
    ol.appendChild(div);
  });

  document.getElementById('explanation-area').style.display = 'none';
  const nb = document.getElementById('next-btn');
  nb.textContent = state.current < state.queue.length-1 ? '下一題 →' : '查看結果 →';
}

function selectAnswer(chosen) {
  if (state.answered) return;
  state.answered = true;
  const id = state.queue[state.current];
  const q = QUESTIONS[id];
  const correct = q.ans;
  const isRight = chosen === correct;

  ['A','B','C','D'].forEach(l => {
    const el = document.getElementById('opt-'+l);
    el.classList.add('disabled');
    if (l === correct) el.classList.add('correct');
    else if (l === chosen && !isRight) el.classList.add('selected-wrong');
  });

  if (isRight) {
    state.correct++;
    document.getElementById('exp-result').textContent = '✅ 答對了！';
    document.getElementById('exp-result').className = 'explanation-result correct';
    document.getElementById('exp-answer').textContent = '正確答案：' + correct + '　' + q.opts[correct];
  } else {
    state.wrong++;
    state.wrongIds.push(id);
    incError(id);
    document.getElementById('exp-result').textContent = '❌ 答錯了';
    document.getElementById('exp-result').className = 'explanation-result wrong';
    document.getElementById('exp-answer').textContent = '正確答案：' + correct + '　' + q.opts[correct];
  }

  document.getElementById('exp-text').innerHTML = q.exp.replace(/\n/g, '<br>');
  document.getElementById('explanation-area').style.display = 'block';
  document.getElementById('quiz-score-label').textContent = '✅ '+state.correct+'　❌ '+state.wrong;
}

function nextQuestion() {
  if (state.current < state.queue.length-1) {
    state.current++;
    renderQuestion();
    window.scrollTo(0,0);
  } else {
    showResult();
  }
}
function confirmEndEarly() {
  if (confirm('確定要提前結束練習嗎？\n目前已答 '+(state.current+1)+' 題，成績將以已答題數計算。')) {
    // trim queue to answered portion
    state.queue = state.queue.slice(0, state.current + 1);
    showResult();
  }
}

// ─── RESULT ──────────────────────────────────────────────────────────────────
function showResult() {
  goTo('screen-result');
  const total = state.queue.length;
  const score = Math.round((state.correct / total) * 100);
  document.getElementById('result-score').textContent = score;
  const titles = [
    [90,'太強了！考試必過 🎉'],
    [75,'很不錯，再複習一下！'],
    [60,'還要加油，重點再看看'],
    [0,'多練幾次，一定可以的！']
  ];
  const t = titles.find(([min]) => score >= min);
  document.getElementById('result-title').textContent = t ? t[1] : '加油！';
  document.getElementById('result-sub').textContent = '（換算100分制成績）';
  document.getElementById('r-correct').textContent = state.correct;
  document.getElementById('r-wrong').textContent = state.wrong;

  const area = document.getElementById('wrong-list-area');
  if (state.wrongIds.length === 0) {
    area.innerHTML = '<div style="text-align:center;padding:20px;color:var(--green)">🎉 全部答對！</div>';
    return;
  }
  let html = '<div class="wrong-list-title">本次答錯的題目：</div>';
  state.wrongIds.forEach(id => {
    const q = QUESTIONS[id];
    html += `<div class="wrong-item">
      <div class="wrong-item-num">第${q.ch}章 第${q.num}題</div>
      <div class="wrong-item-text">${q.text.substring(0,60)}…</div>
      <div class="wrong-item-answer">✅ 正確答案：${q.ans}　${q.opts[q.ans]}</div>
    </div>`;
  });
  area.innerHTML = html;
}

// ─── OVERVIEW ────────────────────────────────────────────────────────────────
function setOvFilter(f) {
  state.ovFilter = f;
  ['all','light','heavy'].forEach(x => {
    document.getElementById('ov-'+x).classList.toggle('active', x===f);
  });
  renderOverview();
}

function renderOverview() {
  const all = Object.values(QUESTIONS);
  const filtered = state.ovFilter === 'all' ? all :
    all.filter(q => q.pool === state.ovFilter);
  const el = document.getElementById('overview-list');
  el.innerHTML = filtered.map(q => {
    const badge = q.pool === 'light'
      ? '<span class="overview-pool-badge badge-light">一點點不熟</span>'
      : '<span class="overview-pool-badge badge-heavy">很不熟</span>';
    return `<div class="overview-item">
      <div class="overview-item-header">
        <span class="overview-item-num">第${q.ch}章 第${q.num}題</span>
        ${badge}
      </div>
      <div class="overview-item-q">${q.text}</div>
      <div class="overview-answer">✅ ${q.ans}　${q.opts[q.ans]}</div>
      <div class="overview-exp">${q.exp.replace(/\n/g,'<br>')}</div>
    </div>`;
  }).join('');
}

// ─── ERRORS ──────────────────────────────────────────────────────────────────
function renderErrors() {
  const errs = getErrors();
  const el = document.getElementById('error-list');
  const entries = Object.entries(errs).filter(([id]) => QUESTIONS[id]);
  if (entries.length === 0) {
    el.innerHTML = '<div class="no-errors"><div class="no-errors-icon">🎉</div><div>還沒有錯題紀錄！</div><div style="margin-top:8px;font-size:13px">開始練習後，答錯的題目會顯示在這裡</div></div>';
    return;
  }
  entries.sort((a,b) => b[1]-a[1]);
  el.innerHTML = entries.map(([id, cnt]) => {
    const q = QUESTIONS[id];
    return `<div class="error-item">
      <div class="error-item-header">
        <span style="font-size:13px;color:var(--sub)">第${q.ch}章 第${q.num}題</span>
        <span class="error-count-badge">答錯 ${cnt} 次</span>
      </div>
      <div class="error-item-q">${q.text}</div>
      <div class="error-item-answer">✅ 正確答案：${q.ans}　${q.opts[q.ans]}</div>
      <div class="error-item-exp">${q.exp.replace(/\n/g,'<br>')}</div>
    </div>`;
  }).join('');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
selectPool('mixed');
updateCountdown();
setInterval(updateCountdown, 60000);
updateHomeStats();
</script>
